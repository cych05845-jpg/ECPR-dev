      ` : ''}

      ${a.concerns && a.concerns.length ? `
        <div class="ai-section ai-section-concerns">
          <h4>⚠️ 需特別關注</h4>
          <ul>${a.concerns.map(c => `<li>${escapeHtml(c)}</li>`).join('')}</ul>
        </div>
      ` : ''}

      <div class="ai-disclaimer">
        ⚠️ 分析由 AI 生成,僅供參考。請以實際案件內容為準。內容已去識別化,不含病人資訊。
      </div>
    </div>
  `;
  target.innerHTML = html;
}

// 隱藏門檻:封緘超過 N 天的不顯示在分類分頁
const HIDE_CLOSED_AFTER_DAYS = 3;

// 判斷案件是否要在分類分頁隱藏
function shouldHideClosed(c) {
  if (c.state !== 'closed') return false;
  if (!c.closedAt) return false;
  const d = new Date(String(c.closedAt).replace(' ', 'T'));
  if (isNaN(d)) return false;
  const days = (Date.now() - d.getTime()) / 86400000;
  return days > HIDE_CLOSED_AFTER_DAYS;
}

// 控制是否強制顯示某分類的所有已封緘
const showAllClosed = {};
// 分類分頁封緘區段是否展開(預設摺疊)
const closedSectionOpen = {};

function toggleClosedSection(catId) {
  closedSectionOpen[catId] = !closedSectionOpen[catId];
  renderPanes();
}

// 請修分頁:subType chip 篩選列
// 顯示「全部 / 醫工 / 工務 / 建材 / 資訊」,各 chip 帶現有案件數
// 計數使用 allItems(已扣除採購中流程的案件),所以反映「請修分頁實際會看到的案件數」
const REPAIR_SUB_CHIPS = ['醫工', '工務', '建材', '資訊'];
function renderRepairSubChips(allItems) {
  // 排除採購流程的案件(跟主體渲染邏輯一致)
  const visibleForCount = allItems.filter(x => !isInPurchasingFlow(x) && x.state !== 'closed');
  const current = state.repairSubFilter || 'all';
  const counts = { all: visibleForCount.length };
  REPAIR_SUB_CHIPS.forEach(k => {
    counts[k] = visibleForCount.filter(x => x.subType === k).length;
  });
  const chip = (key, label) => `
    <button class="rsub-chip ${current === key ? 'active' : ''}"
            onclick="setRepairSubFilter('${key}')">
      ${label}<span class="rsub-chip-count">${counts[key] || 0}</span>
    </button>`;
  return `
    <div class="rsub-chips">
      ${chip('all', '全部')}
      ${REPAIR_SUB_CHIPS.map(k => chip(k, k)).join('')}
    </div>`;
}

function setRepairSubFilter(key) {
  state.repairSubFilter = key;
  renderPanes();
}

function renderPane(catId) {
  const allItems = state.cases.filter(x => x.cat === catId && String(x.deleted || '') !== 'yes');
  const kw = state.paneFilter[catId] || '';
  const items = kw ? allItems.filter(c => matchPaneFilter(c, kw)) : allItems;

  // 採購中流程的請修案件(purchasing / 已到貨等批准),不顯示在「請修」分頁
  // need_decision(等裁示)留在請修分頁,因為等裁示就是等護理長處理
  // 已歸入採購中分頁,避免重複佔據 leader 視野
  // 但搜尋時不過濾(讓 leader 可以追查物件歷史)
  let visibleItems = (catId === 'repair' && !kw)
    ? items.filter(x => !isInPurchasingFlow(x))
    : items;

  // 請修分頁特殊處理:subType chip 篩選(僅在非搜尋狀態套用)
  const repairSub = state.repairSubFilter || 'all';
  if (catId === 'repair' && !kw && repairSub !== 'all') {
    visibleItems = visibleItems.filter(x => x.subType === repairSub);
  }

  const pending = visibleItems.filter(x => x.state === 'pending_approval').sort((a,b) => String(b.created).localeCompare(String(a.created)));
  const open    = visibleItems.filter(x => x.state === 'open' || x.state === 'need_decision' || x.state === 'purchasing').sort((a,b) => String(b.created).localeCompare(String(a.created)));
  const closed  = visibleItems.filter(x => x.state === 'closed').sort((a,b) => String(b.closedAt||'').localeCompare(String(a.closedAt||'')));

  // 3 天內封緘 vs 3 天前封緘
  const closedRecent = closed.filter(c => !shouldHideClosed(c));
  const closedHidden = closed.filter(c => shouldHideClosed(c));
  const showAll = !!showAllClosed[catId];
  const sectionOpen = !!closedSectionOpen[catId];

  // 篩選結果跨狀態(搜尋時把已封緘的也顯示出來,方便追查物件歷史)
  const isFiltering = !!kw;

  const catLabel = CATS.find(x=>x.id===catId).label;
  let html = paneFilterBox(catId, `🔍 在「${catLabel}」內搜尋 — 例:推床、ER101、監視器`);

  // 新增按鈕移到頂部(在搜尋框下方,案件清單上方)
  if (!isReadOnly()) {
    html += `<button class="add-btn add-btn-top" onclick="openAddCase('${catId}')">+ 新增${catLabel}案件</button>`;
  }

  // 請修分頁專屬:subType chip 篩選列
  if (catId === 'repair' && !kw) {
    html += renderRepairSubChips(allItems);
  }

  if (isFiltering) {
    html += `<div style="background:var(--accent-bg);color:var(--accent-d);padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:18px;">
      🔍 篩選「${escapeHtml(kw)}」共 ${visibleItems.length} 件(含全部歷史)
    </div>`;
  }

  if (pending.length) {
    html += `<div class="section-h pending">待批准封緘 (${pending.length})</div>`;
    html += pending.map(cardHTML).join('');
  }
  html += `<div class="section-h">未結案 (${open.length})</div>`;
  html += open.length ? open.map(cardHTML).join('') : '<div class="empty">沒有未結案件</div>';

  // 篩選時:不分「3 天內 / 3 天前」,全部顯示出來
  if (isFiltering) {
    if (closed.length) {
      html += `<div class="section-h closed">已封緘 (${closed.length}) — 含全部歷史</div>`;
      html += closed.map(cardHTML).join('');
    }
  } else if (closedRecent.length || closedHidden.length) {
    // 整個封緘區段預設摺疊
    const totalClosed = closedRecent.length + (closedHidden.length || 0);
    html += `<div class="section-h closed section-h-toggle" onclick="toggleClosedSection('${catId}')" style="cursor:pointer;display:flex;align-items:center;gap:8px;">
      <span class="closed-arrow">${sectionOpen ? '▾' : '▸'}</span>
      已封緘 (${closedRecent.length}${closedHidden.length ? ` + ${closedHidden.length} 隱藏` : ''})
      <span style="font-size:15px;color:var(--text3);font-weight:400;margin-left:auto;">${sectionOpen ? '點擊收起' : '點擊展開'}</span>
    </div>`;
    if (sectionOpen) {
      html += closedRecent.map(cardHTML).join('');
      if (closedHidden.length) {
        if (showAll) {
          html += `<div style="text-align:center;margin:12px 0;">
            <button onclick="toggleClosedHidden('${catId}')" style="background:transparent;color:var(--text2);">▴ 收合 ${closedHidden.length} 件 3 天前的封緘紀錄</button>
          </div>`;
          html += closedHidden.map(cardHTML).join('');
        } else {
          html += `<div style="text-align:center;margin:12px 0;">
            <button onclick="toggleClosedHidden('${catId}')" style="background:transparent;color:var(--accent-d);font-size:18px;">▾ 顯示其他 ${closedHidden.length} 件已封緘紀錄(或用搜尋查詢)</button>
          </div>`;
        }
      }
    }
  }
  document.getElementById('pane-'+catId).innerHTML = html;
}

function toggleClosedHidden(catId) {
  showAllClosed[catId] = !showAllClosed[catId];
  renderPanes();
}

// 展開狀態存到 state(切分頁不會收起)
if (!state.expanded) state.expanded = new Set();

function toggleExpand(caseId, ev) {
  // 點到按鈕、checklist、附件等,不要展開
  if (ev) {
    const tag = ev.target.tagName;
    if (tag === 'BUTTON' || tag === 'INPUT' || tag === 'A' || tag === 'IMG') return;
    if (ev.target.closest('button,input,a,.checklist,.attach,.patient-info,.staff-info,.time-fields,.actions,.p-del')) return;
  }
  if (state.expanded.has(caseId)) state.expanded.delete(caseId);
  else state.expanded.add(caseId);
  // 局部更新該卡片
  renderPanes();
}

function expandAll(catId) {
  state.cases.filter(c => c.cat === catId).forEach(c => state.expanded.add(c.id));
  renderPanes();
}
function collapseAll(catId) {
  state.cases.filter(c => c.cat === catId).forEach(c => state.expanded.delete(c.id));
  renderPanes();
}

// 計算「N 天前」
function timeAgo(dateStr) {
  if (!dateStr) return '';
  const d = new Date(String(dateStr).replace(' ', 'T'));
  if (isNaN(d)) return '';
  const min = Math.floor((Date.now() - d.getTime()) / 60000);
  if (min < 1) return '剛才';
  if (min < 60) return `${min} 分鐘前`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr} 小時前`;
  const day = Math.floor(hr / 24);
  if (day < 30) return `${day} 天前`;
  const mo = Math.floor(day / 30);
  return `${mo} 個月前`;
}

// 案件當前進度文字描述(取代 N/M 計數)
function caseStatus(c) {
  // 已封緘
  if (c.state === 'closed') return { text: '已封緘', cls: 'cps-closed' };
  // 等批准
  if (c.state === 'pending_approval') {
    const wf = c.waitingFor || '';
    if (wf.indexOf('已到貨') >= 0) return { text: '已到貨 · 等批准', cls: 'cps-arrived' };
    if (wf.indexOf('維修完成') >= 0) return { text: '維修完成 · 等批准', cls: 'cps-pending' };
    if (wf.indexOf('不採購') >= 0) return { text: '不採購 · 等批准', cls: 'cps-pending' };
    return { text: '等批准', cls: 'cps-pending' };
  }
  // 等護理長裁示
  if (c.state === 'need_decision') return { text: '已報廢 · 等裁示', cls: 'cps-decision' };
  // 採購中
  if (c.state === 'purchasing') return { text: '已採購', cls: 'cps-purchasing' };

  // open 狀態 — 看 checklist 推斷進度(請修專用)
  if (c.cat === 'repair') {
    const cl = c.checklist || [];
    const submit = cl.find(x => x.id === 'submit');
    const process = cl.find(x => x.id === 'process');
    if (process && process.done) return { text: '維修中', cls: 'cps-active' };
    if (submit && submit.done) return { text: '已開單', cls: 'cps-active' };
    return { text: '待處理', cls: 'cps-pending' };
  }

  // 其他類別 — 顯示完成度
  const total = c.checklist ? c.checklist.length : 0;
  const done = c.checklist ? c.checklist.filter(x => x.done).length : 0;
  if (total === 0) return { text: '處理中', cls: 'cps-active' };
  if (done === total) return { text: '可送批准', cls: 'cps-pending' };
  return { text: `處理中 ${done}/${total}`, cls: 'cps-active' };
}

function cardHTML(c) {
  const stateClass = c.state === 'pending_approval' ? 'pending'
                   : c.state === 'closed' ? 'closed'
                   : c.state === 'need_decision' ? 'need_decision'
                   : c.state === 'purchasing' ? 'purchasing'
                   : '';
  const tierClass = (c.tier === 2 || c.tier === '2') ? 'tier2' : '';
  const runawayClass = (c.cat === 'event' && c.subType === '病人異常離院') ? 'runaway' : '';
  const isExpanded = state.expanded.has(c.id);
  const expandedClass = isExpanded ? 'expanded' : 'collapsed';

  // 進度統計
  const total = c.checklist ? c.checklist.length : 0;
  const done = c.checklist ? c.checklist.filter(x => x.done).length : 0;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  // 案件當前進度文字描述(取代 N/M 計數)
  const progressInfo = caseStatus(c);

  // 最新一筆 progress
  const lastProgress = c.progress && c.progress.length ? c.progress[c.progress.length - 1] : null;

  // 是否逾期(7 天未更新 + 未結案)
  const updateAgo = timeAgo(c.updatedAt || c.created);
  const daysOld = (() => {
    const d = new Date(String(c.updatedAt || c.created).replace(' ', 'T'));
    if (isNaN(d)) return 0;
    return Math.floor((Date.now() - d.getTime()) / 86400000);
  })();
  const stale = c.state === 'open' && daysOld >= 3;

  const announce = !!(c.flags && c.flags.announce);
  const announceClass = announce ? 'announce' : '';

  return `<div class="card ${stateClass} ${tierClass} ${runawayClass} ${announceClass} ${expandedClass} ${stale ? 'stale' : ''}" onclick="toggleExpand('${c.id}', event)">

    ${announce ? renderAnnounceBanner(c, isExpanded) : ''}

    ${c.state === 'pending_approval' ? `<div class="approval-banner">${isApprover() ? `⏸ 等你批准 → 封緘${c.waitingFor && c.waitingFor !== '處理中' ? ` <span style="opacity:0.8;font-weight:500;">(${escapeHtml(c.waitingFor)})</span>` : ''}` : `⏸ 等護理長/副護理長批准 → 封緘`}</div>` : ''}

    ${c.state === 'need_decision' ? `<div class="decision-banner">${isApprover() ? `⏳ 等你裁示是否採購` : `⏳ 等護理長裁示`}</div>` : ''}

    ${c.state === 'purchasing' ? `<div class="purchasing-banner">🛒 已採購</div>` : ''}

    <!-- 摘要區(永遠顯示)-->
    <div class="card-summary">
      <div class="cs-line1">
        <span class="cs-prio">${prioBadge(c.priority)}</span>
        <span class="cs-cat">${escapeHtml(c.subType || '')}</span>
        <span class="cs-title">${escapeHtml(c.title)}</span>
        <span class="cs-toggle">${isExpanded ? '▴' : '▾'}</span>
      </div>

      <div class="cs-line2">
        <span class="cs-status ${statusClass(c.waitingFor)}" ${isReadOnly() ? '' : `onclick="event.stopPropagation();openStatusPicker('${c.id}')"`}>${statusIcon(c.waitingFor)} ${escapeHtml(shortStatus(c.waitingFor))}${isReadOnly() ? '' : ' ▾'}</span>
        <span class="cs-time">⏱ ${escapeHtml(updateAgo)}${stale ? ` <span class="cs-stale-tag">${daysOld} 天未動</span>` : ''}</span>
        <span class="cs-progress-pill ${progressInfo.cls}">${escapeHtml(progressInfo.text)}</span>
        ${stateBadge(c.state)}
        ${isNotCase(c) ? '<span class="badge badge-notcase" title="調查後不符合事件定義,撤銷通報">❎ 不成案</span>' : ''}
      </div>

      <div class="cs-flags">${affiliationBadge(c)}${tierBadge(c.tier)}${flagBadges(c.flags)}</div>

      ${lastProgress && !isExpanded ? `
        <div class="cs-last-progress">▸ <span class="cs-lp-who">${escapeHtml(lastProgress.who)}</span> ${escapeHtml(lastProgress.text)}</div>
      ` : ''}
    </div>

    <!-- 詳細內容(展開才顯示)-->
    ${isExpanded ? `
      <div class="card-detail">
        ${runawayClass ? runawayBanner(c) : ''}
        <div class="card-body">${escapeHtml(c.detail || '')}</div>
        ${patientInfoHTML(c)}
        ${staffInfoHTML(c)}
        ${timelineHTML(c)}
        ${checklistHTML(c)}
        ${attachmentsHTML(c)}
        ${progressHTML(c.progress, c.id, c.state === 'closed')}
        ${c.state === 'closed'
          ? `<div class="card-meta" style="margin-top:10px;">已封緘 ${escapeHtml(c.closedAt)} · 批准:${escapeHtml(c.closedBy)}</div>`
          : actionsHTML(c)}
        <div class="card-meta" style="margin-top:8px;">取得 ${escapeHtml(String(c.created).split(' ')[0])} · ${escapeHtml(c.meta || '')}</div>
      </div>
    ` : ''}

  </div>`;
}

// 歸屬標籤(只請假類別顯示)
function affiliationBadge(c) {
  if (c.cat !== 'leave' || !c.affiliation) return '';
  const map = {
    internal:   { label: '單位內',         cls: 'b-blue' },
    other_unit: { label: '其他單位',       cls: 'b-amber' },
    non_nursing:{ label: '非護理職類',     cls: 'b-gray' },
  };
  const a = map[c.affiliation];
  return a ? `<span class="badge ${a.cls}">${a.label}</span>` : '';
}

// ====== 案件狀態(已做了什麼裁決)======
// 情境註記(下半部 picker 選項) — 不影響 checklist 進度,只是輔助說明
const CONTEXT_FLAGS = [
  { value: '釐清中',   icon: '🔍', cls: 'st-wait' },
  { value: '已反映給', icon: '↪️', cls: 'st-wait', needsTarget: true },
];

function statusIcon(s) {
  if (!s) return '🟢';
  const base = String(s).split(':')[0].split(':')[0];
  // 先看是不是情境註記
  const opt = CONTEXT_FLAGS.find(x => x.value === base);
  if (opt) return opt.icon;
  // 進度推算狀態
  if (base.indexOf('已採購') >= 0) return '🛒';
  if (base.indexOf('已到貨') >= 0) return '📦';
  if (base.indexOf('完成') >= 0) return '✅';
  if (base.indexOf('已報廢') >= 0 || base.indexOf('建議採購') >= 0) return '♻️';
  if (base.indexOf('不採購') >= 0) return '🚫';
  return '🟢';
}

// 縮短顯示 — 去掉「,等XX」這種冗詞
function shortStatus(s) {
  if (!s) return '處理中';
  const map = {
    '已採購,等到貨': '已採購',
    '已到貨,等批准': '已到貨',
    '不採購,等批准': '不採購',
    '完成,等批准': '完成',
    '已報廢,建議採購': '建議採購',
    '統一採購,已封緘': '統一採購',
    '維修完成,等批准': '維修完成',
  };
  return map[s] || s;
}

function statusClass(s) {
  if (!s || s === '處理中') return 'st-active';
  const base = String(s).split(':')[0].split(':')[0];
  const opt = CONTEXT_FLAGS.find(x => x.value === base);
  if (opt) return opt.cls;
  if (base.indexOf('已採購') >= 0 || base.indexOf('已到貨') >= 0) return 'st-wait';
  if (base.indexOf('完成') >= 0) return 'st-done';
  if (base.indexOf('已報廢') >= 0 || base.indexOf('建議採購') >= 0) return 'st-disposal';
  return 'st-active';
}

// ===== 新版 Picker =====
// 上半部 = checklist(同步),下半部 = 情境註記
function openStatusPicker(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const checklist = migrateRepairChecklist(c) || [];
  const cur = c.waitingFor || '';
  const curBase = String(cur).split(':')[0].split(':')[0];
  const isClosed = c.state === 'closed';

  // 渲染 checklist 一個項目
  const renderCkRow = (it) => {
    const isAction = c.cat === 'repair' && (it.id === 'completed' || it.id === 'disposal');
    const cls = ['picker-row', it.done ? 'checked' : '', isAction ? 'picker-action' : ''].filter(Boolean).join(' ');
    return `<button type="button" class="${cls}" onclick="pickerToggleCheck('${caseId}', '${it.id}', this)">
      <span class="picker-dot">${it.done ? '✓' : ''}</span>
      <span class="picker-label">${escapeHtml(it.label)}${isAction && !it.done ? ` <span class="picker-hint">${it.id === 'completed' ? '→ 自動送批准' : '→ 等護理長裁示'}</span>` : ''}</span>
    </button>`;
  };

  // 渲染情境註記
  const renderFlagRow = (opt) => {
    const matched = opt.needsTarget ? curBase === opt.value : curBase === opt.value;
    const cls = ['picker-row', 'picker-flag', matched ? 'checked' : ''].filter(Boolean).join(' ');
    const onClick = opt.needsTarget
      ? `pickerSetFlagWithTarget('${caseId}', ${JSON.stringify(opt.value).replace(/"/g, '&quot;')})`
      : `pickerSetFlag('${caseId}', ${JSON.stringify(opt.value).replace(/"/g, '&quot;')})`;
    return `<button type="button" class="${cls}" onclick="${onClick}">
      <span class="picker-dot">${matched ? '✓' : ''}</span>
      <span class="picker-label">${opt.icon} ${escapeHtml(opt.value)}${opt.needsTarget ? ` <span class="picker-hint">(填對象)</span>` : ''}</span>
    </button>`;
  };

  showModal('更新進度', `
    <div style="font-size:16px;color:var(--text2);margin-bottom:6px;">點選即更新,不需按確認</div>
    ${checklist.length ? `
      <div class="picker-section-h">📋 案件進度(點擊勾選)</div>
      <div class="picker-list">${checklist.map(renderCkRow).join('')}</div>
    ` : ''}
    <div class="picker-section-h" style="margin-top:14px;">⚙️ 情境註記(選填)</div>
    <div style="font-size:14px;color:var(--text3);margin-bottom:6px;">不影響進度,只是補充目前卡在哪</div>
    <div class="picker-list">
      ${CONTEXT_FLAGS.map(renderFlagRow).join('')}
      <button type="button" class="picker-row picker-flag" onclick="pickerCustomFlag('${caseId}')">
        <span class="picker-dot"></span>
        <span class="picker-label">🔧 其他(手動填寫)</span>
      </button>
      ${cur ? `<button type="button" class="picker-row picker-flag" onclick="pickerClearFlag('${caseId}')" style="border-style:dashed;color:var(--text2);">
        <span class="picker-dot"></span>
        <span class="picker-label">✕ 清除目前的「${escapeHtml(shortStatus(cur))}」註記</span>
      </button>` : ''}
    </div>
  `, () => true);
}

// 樂觀更新 toggle checklist 項目(0 秒延遲)
async function pickerToggleCheck(caseId, itemId, btnEl) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const cl = migrateRepairChecklist(c) || [];
  const item = cl.find(x => x.id === itemId);
  if (!item) return;

  // 重要 checklist 觸發確認(避免誤勾)
  if (c.cat === 'repair' && (itemId === 'completed' || itemId === 'disposal') && !item.done) {
    const msg = itemId === 'completed'
      ? '勾「維修完成」會自動送批准,確定?'
      : '勾「已報廢,等採購」會送護理長裁示,確定?';
    if (!confirm(msg)) return;
  }

  // 立刻在前端視覺反映(樂觀更新)
  item.done = !item.done;
  if (btnEl) {
    btnEl.classList.toggle('checked', item.done);
    const dot = btnEl.querySelector('.picker-dot');
    if (dot) dot.textContent = item.done ? '✓' : '';
  }

  // 背景同步到後端
  const r = await api('toggleCheck', { caseId, itemId });
  if (!r || !r.ok) {
    // 失敗 → revert
    item.done = !item.done;
    if (btnEl) {
      btnEl.classList.toggle('checked', item.done);
      const dot = btnEl.querySelector('.picker-dot');
      if (dot) dot.textContent = item.done ? '✓' : '';
    }
    toast(r ? r.error : '更新失敗,請重試');
    return;
  }

  // 重要勾選後 toast 提醒(維持原行為)
  if (c.cat === 'repair' && item.done) {
    if (itemId === 'completed') toast('✅ 維修完成,已自動送批准');
    else if (itemId === 'disposal') toast('♻️ 已報廢,等護理長裁示是否採購');
  }
  refreshAll();
}

// 設情境註記
async function pickerSetFlag(caseId, value) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const updates = { waitingFor: value };

  c.waitingFor = value;
  refreshAll();
  closeModal();
  const r = await api('updateCase', { caseId, updates });
  if (r && r.ok) {
    api('addProgress', { caseId, text: `⚙️ 標記:${value}` });
    toast(`已標記:${value}`);
  } else toast(r ? r.error : '更新失敗');
}

async function pickerSetFlagWithTarget(caseId, baseLabel) {

async function pickerClearFlag(caseId) {

// ====== 交班宣導旗標 ======
async function toggleAnnounce(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const cur = !!(c.flags && c.flags.announce);
  // 取消宣導:直接執行,不跳 modal
  if (cur) {
    const newFlags = { ...(c.flags || {}), announce: false };
    // 保留 announceText 物件,以便日後若再次標宣導,話術還在
    const r = await api('updateCase', { caseId, updates: { flags: newFlags } });
    if (r && r.ok) { toast('已取消宣導'); refreshAll(); }
    else toast(r ? r.error : '更新失敗');
    return;
  }
  // 標宣導:跳三題引導 modal
  openAnnounceModal(caseId);
}

// 三題引導 modal:幫助人員寫出有結構的宣導(避免重複發生)
function openAnnounceModal(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const at = (c.flags && c.flags.announceText) || {};
  // 預設值:what 用案件標題,其他空白
  const defaultWhat = at.what || c.title || '';
  const defaultAction = at.action || '';
  const defaultPrevent = at.prevent || '';

  showModal('🔔 標為交班宣導', `
    <div style="background:#fff8e1;color:#5d4407;padding:10px 14px;border-radius:8px;margin-bottom:12px;font-size:18px;line-height:1.5;">
      <strong>用三句話讓同仁知道重點。</strong>填得越具體,越能避免下次再發生。
    </div>
    <label>📌 發生了什麼?</label>
    <input id="ann-what" placeholder="例:ER101 床滲水" value="${escapeHtml(defaultWhat)}">

    <label style="margin-top:10px;">⚠️ 現在請大家做什麼?</label>
    <input id="ann-action" placeholder="例:暫不收治該床,改用 ER102/103" value="${escapeHtml(defaultAction)}">

    <label style="margin-top:10px;">🎯 怎麼避免再發生?<span style="color:var(--text3);font-weight:400;">(選填,但效果最好)</span></label>
    <input id="ann-prevent" placeholder="例:發現床位滲水立即回報,避免儀器受損" value="${escapeHtml(defaultPrevent)}">
    <div style="font-size:15px;color:var(--text3);margin-top:4px;line-height:1.5;">
      💡 想想看:這事件怎麼發生的?以後同仁該注意什麼動作或習慣?
    </div>
  `, async () => {
    const what = document.getElementById('ann-what').value.trim();
    const action = document.getElementById('ann-action').value.trim();
    const prevent = document.getElementById('ann-prevent').value.trim();
    if (!what) { toast('「發生了什麼」必填'); return false; }
    const announceText = { what, action, prevent };
    const newFlags = { ...(c.flags || {}), announce: true, announceText };
    const r = await api('updateCase', { caseId, updates: { flags: newFlags } });
    if (r && r.ok) { toast('已標記為交班宣導'); refreshAll(); return true; }
    toast(r ? r.error : '更新失敗');
    return false;
  });
}

// 將三題組合成口頭話術(用於宣導分頁、交班摘要、複製按鈕)
function buildAnnounceScript(c) {
  const at = (c.flags && c.flags.announceText) || {};
  // 沒填三題:fallback 用案件標題
  if (!at.what && !at.action && !at.prevent) {
    return c.title || '';
  }
  const parts = [];
  if (at.what) parts.push(at.what);
  if (at.action) parts.push(at.action);
  if (at.prevent) parts.push(`提醒大家:${at.prevent}`);
  return parts.join(',');
}

// 案件卡片上的宣導 banner;摺疊時只顯示一行,展開時顯示三句話術 + 操作按鈕
function renderAnnounceBanner(c, isExpanded) {
  const at = (c.flags && c.flags.announceText) || {};
  const hasText = !!(at.what || at.action || at.prevent);
  if (!isExpanded) {
    // 摺疊狀態:沿用舊版簡潔樣式
    return '<div class="announce-banner">🔔 交班需口頭宣導</div>';
  }
  // 展開狀態:顯示完整話術
  const editBtn = !isReadOnly() ? `<button onclick="event.stopPropagation();openAnnounceModal('${c.id}')" style="font-size:16px;padding:4px 10px;">✏️ 編輯話術</button>` : '';
  const copyBtn = `<button onclick="event.stopPropagation();copyAnnounceScript('${c.id}')" style="font-size:16px;padding:4px 10px;">📋 複製話術</button>`;
  if (!hasText) {
    // 已標宣導但沒填三題:鼓勵填寫
    return `<div class="announce-banner-detail">
      <div class="ab-head">🔔 交班需口頭宣導</div>
      <div class="ab-empty">尚未填寫話術 — 點「編輯話術」用三句話讓同仁知道重點。</div>
      <div class="ab-actions">${editBtn}${copyBtn}</div>
    </div>`;
  }
  return `<div class="announce-banner-detail">
    <div class="ab-head">🔔 交班需口頭宣導</div>
    ${at.what ? `<div class="ab-line"><span class="ab-icon">📌</span>${escapeHtml(at.what)}</div>` : ''}
    ${at.action ? `<div class="ab-line"><span class="ab-icon">⚠️</span>${escapeHtml(at.action)}</div>` : ''}
    ${at.prevent ? `<div class="ab-line ab-prevent"><span class="ab-icon">🎯</span>${escapeHtml(at.prevent)}</div>` : ''}
    <div class="ab-actions">${editBtn}${copyBtn}</div>
  </div>`;
}

// 複製宣導話術到剪貼簿
async function copyAnnounceScript(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const script = buildAnnounceScript(c);
  try {
    await navigator.clipboard.writeText(script);
    toast('話術已複製');
  } catch (e) {
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = script;
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast('話術已複製'); }
    catch (e2) { toast('複製失敗,請手動選取'); }
    document.body.removeChild(ta);
  }
}

// 病人離院的一週倒數提醒
function runawayBanner(c) {
  if (c.state !== 'open') return '';
  const days = daysSinceCreated(c);
  if (days >= 7) {

    return `<div class="runaway-banner">
      ⏳ 已建立 ${days} 天,${7 - days} 天後將自動進入待批准
    </div>`;
  }
  return '';
}

// ====== 語音輸入(Web Speech API + 可選 AI 整理) ======
const _voice = { recognition: null, recording: false, targetId: null, originalText: '' };

// 檢查瀏覽器支援
function voiceSupported() {
  return ('SpeechRecognition' in window) || ('webkitSpeechRecognition' in window);
}

// 渲染語音輸入按鈕(放在 textarea 下方)
function voiceInputButtons(targetId, includeAi) {
  if (!voiceSupported()) {
    return `<div style="font-size:14px;color:var(--text3);margin-top:4px;">⚠️ 此瀏覽器不支援語音輸入(請用 Chrome/Edge)</div>`;
  }
  return `<div class="voice-bar">
    <button type="button" class="voice-btn" id="voice-btn-${targetId}"
            onmousedown="startVoice('${targetId}')" onmouseup="stopVoice()"
            ontouchstart="startVoice('${targetId}', event)" ontouchend="stopVoice(event)"
            oncontextmenu="return false;">
      🎤 <span class="voice-btn-label">按住說話</span>
    </button>
    ${includeAi ? `<button type="button" class="voice-ai-btn" onclick="aiCleanText('${targetId}')">
      <span class="ai-tag">AI</span>整理 + 去識別化
    </button>` : ''}
    <span class="voice-hint">說完鬆開即插入文字 · AI 整理會送 Gemini</span>
  </div>
  <div id="voice-status-${targetId}" class="voice-status"></div>`;
}

function startVoice(targetId, ev) {
  if (ev) ev.preventDefault();
  if (!voiceSupported()) { toast('瀏覽器不支援語音'); return; }
  if (_voice.recording) return;

  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const rec = new SR();
  rec.lang = 'zh-TW';
  rec.continuous = true;
  rec.interimResults = true;

  const target = document.getElementById(targetId);
  if (!target) return;
  _voice.originalText = target.value;
  _voice.targetId = targetId;
  _voice.recognition = rec;
  _voice.recording = true;

  // 視覺回饋
  const btn = document.getElementById('voice-btn-' + targetId);
  if (btn) btn.classList.add('recording');
  const status = document.getElementById('voice-status-' + targetId);
  if (status) status.innerHTML = '🔴 錄音中... <span style="opacity:0.7;">說完鬆開按鈕</span>';

  let finalTranscript = '';
  let interimTranscript = '';

  rec.onresult = (event) => {
    interimTranscript = '';
    for (let i = event.resultIndex; i < event.results.length; i++) {
      const t = event.results[i][0].transcript;
      if (event.results[i].isFinal) finalTranscript += t;
      else interimTranscript += t;
    }
    // 即時更新 textarea(原文 + 已確認 + 暫存)
    target.value = (_voice.originalText ? _voice.originalText + '\n' : '') + finalTranscript + interimTranscript;
    // 顯示中間結果
    if (status) status.innerHTML = `🔴 錄音中:<span style="color:var(--accent-d);">${escapeHtml(finalTranscript || interimTranscript || '...')}</span>`;
  };

  rec.onerror = (e) => {
    console.error('Voice error:', e.error);
    if (status) status.innerHTML = `<span style="color:var(--red-text);">⚠️ 錯誤:${e.error === 'not-allowed' ? '需要授權麥克風' : e.error}</span>`;
    stopVoice();
  };

  rec.onend = () => {
    if (_voice.recording) {
      // 還在錄音狀態但 API 自動停了(例如靜音超時),嘗試重啟
      try { rec.start(); } catch (e) { _voice.recording = false; }
    }
  };

  try {
    rec.start();
  } catch (e) {
    toast('語音啟動失敗');
    _voice.recording = false;
    if (btn) btn.classList.remove('recording');
  }
}

function stopVoice(ev) {
  if (ev) ev.preventDefault();
  if (!_voice.recording) return;
  _voice.recording = false;
  try { _voice.recognition && _voice.recognition.stop(); } catch (e) {}
  const btn = document.getElementById('voice-btn-' + _voice.targetId);
  if (btn) btn.classList.remove('recording');
  const status = document.getElementById('voice-status-' + _voice.targetId);
  if (status) status.innerHTML = '✓ 已插入文字。可繼續講或點「AI 整理」';
}

// AI 整理 + 去識別化
async function aiCleanText(targetId) {
  const target = document.getElementById(targetId);
  if (!target) return;
  const text = target.value.trim();
  if (!text) { toast('沒有文字可整理'); return; }

  if (!confirm(`要把以下文字送給 AI 整理 + 去識別化嗎?\n\n⚠️ 文字會傳到 Gemini 雲端。如果你打了精確的姓名/病歷號,AI 會嘗試替換為「個案」「床號 X」,但不保證 100% 過濾乾淨。\n\n按確定繼續。`)) return;

  const status = document.getElementById('voice-status-' + targetId);
  if (status) status.innerHTML = '<span class="ai-tag">AI</span>整理中...';

  const r = await api('aiCleanText', { text });

    if (status) status.innerHTML = `<span style="color:var(--red-text);">${r ? escapeHtml(r.error) : '失敗'}</span>`;

  const cleanedText = r.cleaned || '';
  const cleanedId = 'ai-cleaned-' + targetId;

  // 移除舊的 (如果重複點)
  const old = document.getElementById('ai-clean-box-' + targetId);
  if (old) old.remove();

  const wrap = document.createElement('div');
  wrap.id = 'ai-clean-box-' + targetId;
  wrap.className = 'ai-clean-box';
  wrap.innerHTML = `
    <div class="ai-clean-h">
      <span class="ai-tag ai-tag-lg">AI</span>整理結果(請審核)
      <button type="button" class="ai-clean-close" onclick="closeAiClean('${targetId}')">×</button>
    </div>
    <div style="background:var(--accent-bg);color:var(--accent-d);padding:8px 12px;border-radius:6px;font-size:16px;margin-bottom:8px;line-height:1.5;">
      ✨ 已嘗試去識別化(姓名/病歷號替換)。可編輯後採用,或保留原文。
    </div>
    <textarea id="${cleanedId}" style="min-height:140px;font-size:19px;width:100%;">${escapeHtml(cleanedText)}</textarea>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button type="button" class="primary" onclick="applyAiCleaned('${targetId}')">✓ 採用此版,覆蓋原文</button>
      <button type="button" onclick="closeAiClean('${targetId}')">保留原文</button>
    </div>

  // 插在 textarea 之後(語音工具列的下面)
  const voiceStatus = document.getElementById('voice-status-' + targetId);

    voiceStatus.parentNode.insertBefore(wrap, voiceStatus.nextSibling);

  // 滾到可見位置
  wrap.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

// 計算 case 自建立後過了幾天
function daysSinceCreated(c) {
  if (!c.created) return 0;
  const created = new Date(String(c.created).replace(' ', 'T'));
  if (isNaN(created)) return 0;
  return Math.floor((Date.now() - created.getTime()) / 86400000);
}

// 哪些 checklist 項目要做 7 天逾期警示
const OVERDUE_RULES = {
  event: { items: ['pdca', 'tracking'], days: 7 },
};

function isOverdueItem(c, itemId) {
  const rule = OVERDUE_RULES[c.cat];
  if (!rule) return false;
  if (rule.items.indexOf(itemId) < 0) return false;
  if (c.state === 'closed') return false;
  return daysSinceCreated(c) > rule.days;
}

// 把舊的請修 checklist 遷移成新的
function migrateRepairChecklist(c) {
  if (!c.checklist) return c.checklist;
  const cl = c.checklist;

  // 請修:result/purchase 遷移
  if (c.cat === 'repair') {
    const hasOldResult = cl.some(it => it.id === 'result');
    const hasOldPurchase = cl.some(it => it.id === 'purchase');
    if (hasOldResult || hasOldPurchase) {
      return cl.map(it => {
        if (it.id === 'result') return { ...it, id: 'completed', label: '維修完成' };
        if (it.id === 'purchase') return { ...it, id: 'disposal', label: '已報廢,等採購' };
        return it;
      });
    }
  }

  // 臨床:把舊 id 'pilot' 移除,solution 加 group + label 補(他方問題)
  if (c.cat === 'clinical') {
    const hasOldPilot = cl.some(it => it.id === 'pilot');
    const hasOldSolution = cl.some(it => it.id === 'solution' && !it.group);
    if (hasOldPilot || hasOldSolution) {
      return cl.map(it => {
        if (it.id === 'solution') return { ...it, label: '改善方案產出(我方問題)', group: 'conclusion' };
        if (it.id === 'pilot') return { ...it, id: 'referred', label: '轉介科系處理(他方問題)', group: 'conclusion' };
        return it;
      });
    }
  }

  return cl;
}

function checklistHTML(c) {
  // 顯示前先做遷移(舊案件的 checklist 也能看到新標籤)
  const checklist = migrateRepairChecklist(c);
  if (!checklist || !checklist.length) return '';
  const disabled = c.state === 'closed' || isReadOnly();
  const days = daysSinceCreated(c);
  const rule = OVERDUE_RULES[c.cat];
  const hasAnyOverdue = rule && c.state !== 'closed' &&
    checklist.some(it => rule.items.indexOf(it.id) >= 0 && !it.done && days > rule.days);

  // 渲染單個 checklist 項目
  const renderItem = (it) => {
    const overdue = !it.done && isOverdueItem(c, it.id);
    const cls = ['ck'];
    if (it.done) cls.push('done');
    if (overdue) cls.push('overdue');
    if (it.optional) cls.push('ck-optional');
    if (c.cat === 'repair' && (it.id === 'completed' || it.id === 'disposal')) {
      cls.push('ck-action');
    }
    return `<div class="${cls.join(' ')}" ${disabled ? '' : `onclick="toggleCheck('${c.id}','${it.id}')"`}>
      <span class="dot"></span>
      <span>${escapeHtml(it.label)}${overdue ? ` <span class="ck-tag">逾期 ${days - rule.days} 天</span>` : ''}${it.note ? ` — <em style="color:var(--text2);font-style:normal;">${escapeHtml(it.note)}</em>` : ''}${c.cat === 'repair' && it.id === 'completed' && !it.done ? ' <span style="color:var(--accent-d);font-size:16px;">→ 勾起來自動送批准</span>' : ''}${c.cat === 'repair' && it.id === 'disposal' && !it.done ? ' <span style="color:#a16207;font-size:16px;">→ 勾起來等護理長裁示</span>' : ''}</span>
    </div>`;
  };

  // 請修案件分段顯示:處理進度 vs 結案二選一
  if (c.cat === 'repair') {
    const progressItems = checklist.filter(it => it.id === 'submit' || it.id === 'process');
    const closeItems = checklist.filter(it => it.id === 'completed' || it.id === 'disposal');
    return `<div class="checklist">
      ${hasAnyOverdue ? `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,逾期未完成,請盡速催開</div>` : ''}
      <div class="ck-section-label">📋 處理進度</div>
      ${progressItems.map(renderItem).join('')}
      <div class="ck-section-divider">
        <span class="ck-section-label">🏁 結案(以下二選一)</span>
      </div>
      ${closeItems.map(renderItem).join('')}
    </div>`;
  }

  // 重大異常:成案調查 vs 不成案 兩條獨立路徑
  if (c.cat === 'event') {
    const normalItems = checklist.filter(it => !it.group);
    const investigationItems = checklist.filter(it => it.group === 'investigation');
    const notCaseItem = checklist.find(it => it.group === 'not_case');
    // 沒 group 標記就用通用渲染
    if (investigationItems.length === 0 && !notCaseItem) {
      return `<div class="checklist">
        ${hasAnyOverdue ? `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,PDCA / 追蹤單逾期未完成,請盡速催開</div>` : ''}
        ${checklist.map(renderItem).join('')}
      </div>`;
    }
    const isNotCase = !!(notCaseItem && notCaseItem.done);
    // 若已勾不成案,investigation 整段灰化禁用(視覺上明確,且後端會自動清空)
    const renderInvestigation = it => {
      if (isNotCase) {
        return `<div class="ck-item ck-disabled" title="已勾「不成案」,此項不適用">
          <span class="ck-mark">○</span>
          <span style="opacity:0.55;text-decoration:line-through;">${escapeHtml(it.label)}</span>
        </div>`;
      }
      return renderItem(it);
    };
    return `<div class="checklist">
      ${hasAnyOverdue && !isNotCase ? `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,逾期未完成,請盡速催開</div>` : ''}
      ${normalItems.map(renderItem).join('')}
      <div class="ck-section-divider">
        <span class="ck-section-label">🔍 成案調查路徑</span>
      </div>
      <div style="font-size:16px;color:var(--text2);margin:4px 0 8px 0;">SAC 3 → 做 PDCA · SAC 4 → 開事件追蹤單</div>
      ${investigationItems.map(renderInvestigation).join('')}
      ${notCaseItem ? `
        <div class="ck-section-divider">
          <span class="ck-section-label">或 ❎ 調查後不成案</span>
        </div>
        <div style="font-size:16px;color:var(--text2);margin:4px 0 8px 0;">勾選後 → 上方 SAC/PDCA/追蹤單自動清除,案件以「撤銷通報」結案</div>
        ${renderItem(notCaseItem)}
      ` : ''}
    </div>`;
  }

  // 臨床運作:動作 + 結論(可複選)
  if (c.cat === 'clinical') {
    const normalItems = checklist.filter(it => !it.group);
    const conclusionItems = checklist.filter(it => it.group === 'conclusion');
    if (conclusionItems.length === 0) {
      return `<div class="checklist">
        ${hasAnyOverdue ? `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,逾期未完成</div>` : ''}
        ${checklist.map(renderItem).join('')}
      </div>`;
    }
    return `<div class="checklist">
      ${hasAnyOverdue ? `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,逾期未完成</div>` : ''}
      <div class="ck-section-label">🔧 動作</div>
      ${normalItems.map(renderItem).join('')}
      <div class="ck-section-divider">
        <span class="ck-section-label">🏁 結論(任一或兩個都選)</span>
      </div>
      <div style="font-size:16px;color:var(--text2);margin:4px 0 8px 0;">勾任一個 → 可送批准。我方做 + 他方協調可同時勾。</div>
      ${conclusionItems.map(renderItem).join('')}
    </div>`;
  }

  // 重大外傷:性侵 / 家暴 / 兒虐 特殊 checklist
  if (c.cat === 'trauma' && (c.subType === '性侵' || c.subType === '家暴' || c.subType === '兒虐')) {
    const normalItems = checklist.filter(it => !it.group);
    const groupedItems = {};
    checklist.forEach(it => {
      if (it.group) {
        if (!groupedItems[it.group]) groupedItems[it.group] = [];
        groupedItems[it.group].push(it);
      }
    });

    let html = '<div class="checklist">';

    // 法定通報警語(永遠在最頂)
    html += `<div class="legal-warning">
      ⚠️ <strong>法定強制通報事件</strong>
      <div style="font-size:18px;margin-top:4px;line-height:1.6;">
        24 小時內須完成法定通報。checklist 僅供工作流程追蹤,<strong>不取代正式通報</strong>。
        ${c.subType === '性侵' ? '<br>⚠️ 證物須依鑑識保管鏈交接。<strong>不可拍攝病人身體</strong>,僅拍證物盒/採證套件/表單。' : ''}
      </div>
    </div>`;

    // 家暴/兒虐:時間建議橫條
    if (c.subType === '家暴' || c.subType === '兒虐') {
      const advice = transferAdvice();
      html += `<div class="time-advice ${advice.urgent ? 'urgent' : ''}">
        <strong>${advice.icon} 目前時間判斷</strong>:${advice.message}
      </div>`;
    }

    if (hasAnyOverdue) html += `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,逾期</div>`;

    // 一般項目
    html += normalItems.map(renderItem).join('');

    // 性侵 evidence 三選一
    if (groupedItems.evidence) {
      html += `<div class="ck-section-divider">
        <span class="ck-section-label">🔬 採證(以下三選一)</span>
      </div>
      <div style="font-size:16px;color:var(--text2);margin:4px 0 8px 0;">證物須交社工(緊急時直接交員警),由社工燒製照片給員警</div>`;
      html += groupedItems.evidence.map(renderItem).join('');
    }

    // 家暴/兒虐 transfer 二選一
    if (groupedItems.transfer) {
      html += `<div class="ck-section-divider">
        <span class="ck-section-label">📞 通報路徑(依時間擇一)</span>
      </div>
      <div style="font-size:16px;color:var(--text2);margin:4px 0 8px 0;">社工值班:週一至週五全天、週六上午 12:00 前 · 其餘時間請夜護通報</div>`;
      html += groupedItems.transfer.map(renderItem).join('');
    }

    html += '</div>';
    return html;
  }

  // 其他類別維持原樣
  return `<div class="checklist">
    ${hasAnyOverdue ? `<div class="ck-overdue-banner">⚠️ 已建立 ${days} 天,逾期未完成,請盡速處理</div>` : ''}
    ${checklist.map(renderItem).join('')}
  </div>`;
}

// 平假日判斷 + 給出通報路徑建議
function transferAdvice() {
  const now = new Date();
  // 強制用台灣時區判斷時間,避免裝置時區設錯
  let dow, hour, min, todayStr;
  try {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Asia/Taipei',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', weekday: 'short',
      hour12: false,
    }).formatToParts(now).reduce((a, p) => (a[p.type] = p.value, a), {});
    todayStr = `${parts.year}-${parts.month}-${parts.day}`;
    hour = parseInt(parts.hour, 10);
    min = parseInt(parts.minute, 10);
    // weekday 是 'Mon','Tue'... 轉成 0-6
    const dowMap = { 'Sun': 0, 'Mon': 1, 'Tue': 2, 'Wed': 3, 'Thu': 4, 'Fri': 5, 'Sat': 6 };
    dow = dowMap[parts.weekday] !== undefined ? dowMap[parts.weekday] : now.getDay();
  } catch (e) {
    // fallback:用裝置時區
    dow = now.getDay();
    hour = now.getHours();
    min = now.getMinutes();
    const p = n => String(n).padStart(2, '0');
    todayStr = `${now.getFullYear()}-${p(now.getMonth()+1)}-${p(now.getDate())}`;
  }
  const decimalHour = hour + min / 60;

  // 國定假日清單(2026 年)
  const HOLIDAYS_2026 = [
    '2026-01-01', // 元旦
    '2026-02-16', '2026-02-17', '2026-02-18', '2026-02-19', '2026-02-20', // 春節
    '2026-02-27', '2026-02-28', // 228
    '2026-04-03', '2026-04-04', '2026-04-05', '2026-04-06', // 兒童/清明
    '2026-05-01', // 勞動節
    '2026-06-19', // 端午
    '2026-09-25', // 中秋(連假)
    '2026-10-09', '2026-10-10', // 國慶連假
  ];
  // todayStr 已在上面用台灣時區算出
  const isHoliday = HOLIDAYS_2026.indexOf(todayStr) >= 0;

  // 社工值班:週一至週五全天 + 週六 12:00 前
  const isSocialOnDuty =
    !isHoliday && (
      (dow >= 1 && dow <= 5) ||                // 週一到週五
      (dow === 6 && decimalHour < 12)          // 週六上午
    );

  if (isSocialOnDuty) {
    return {
      icon: '🟢',
      urgent: false,
      message: `現在是社工值班時間(${dow === 6 ? '週六上午' : '平日'}),可直接轉社工通報`,
    };
  }

  // 計算到下個社工上班還有多久
  let nextDuty = new Date(now);
  if (dow === 0) {
    // 週日 → 週一 8:00
    nextDuty.setDate(now.getDate() + 1);
    nextDuty.setHours(8, 0, 0, 0);
  } else if (dow === 6 && decimalHour >= 12) {
    // 週六中午後 → 週一 8:00
    nextDuty.setDate(now.getDate() + 2);
    nextDuty.setHours(8, 0, 0, 0);
  } else if (isHoliday) {
    // 國定假日 → 找下一個非假日
    let d = new Date(now);
    for (let i = 0; i < 14; i++) {
      d.setDate(d.getDate() + 1);
      const ds = d.toISOString().split('T')[0];
      if (HOLIDAYS_2026.indexOf(ds) < 0 && d.getDay() !== 0 && d.getDay() !== 6) {
        nextDuty = new Date(d);
        nextDuty.setHours(8, 0, 0, 0);
        break;
      }
    }
  } else {
    // 其他下班時間,假設下個工作日 8:00
    nextDuty.setDate(now.getDate() + 1);
    nextDuty.setHours(8, 0, 0, 0);
  }

  const hoursToNext = (nextDuty.getTime() - now.getTime()) / 3600000;
  const urgent = hoursToNext > 24;

  return {
    icon: urgent ? '🔴' : '🟡',
    urgent: urgent,
    message: `現在社工已下班(${isHoliday ? '國定假日' : dow === 0 ? '週日' : dow === 6 ? '週六下午' : '下班時間'}),距下個社工上班約 ${Math.round(hoursToNext)} 小時。${urgent ? '<strong>超過 24 小時通報期限,請夜護先通報</strong>' : '可等社工通報'}`,
  };
}

function timelineHTML(c) {
  // 只有 trauma 類別才顯示
  const cat = CATS.find(x => x.id === c.cat);
  if (!cat || !cat.timed) return '';
  const tl = c.timeline || {};
  const isClosed = c.state === 'closed';
  const editable = !isClosed && !isReadOnly();

  // 通用時間欄位渲染(也用於品質指標欄位)
  const renderTimeRow = (f, isQuality) => {
    const val = tl[f.key] || '';
    const display = val ? formatTimeShort(val) : '—';

    let extraInfo = '';
    let extraCls = '';
    if (isQuality && f.requiredKey && tl[f.requiredKey] && tl[f.requiredKey] !== '-') {
      // 品質欄位:顯示規定時間,但靜音模式 — 沒設正確時間前不顯示超時
      extraInfo = `<span class="tf-required">規定 ${escapeHtml(tl[f.requiredKey])}</span>`;
      // 靜音模式:除非 leader 主動確認過(traumaDr_confirmed === true),否則不顯示紅色
      const confirmed = !!tl[f.statusKey + '_confirmed'];
      if (val && confirmed) {
        extraCls = tl[f.statusKey] === 'ontime' ? 'ontime' : tl[f.statusKey] === 'late' ? 'late' : '';
      }
    }

    return `<div class="tf">
      <span class="tf-label">${f.icon} ${escapeHtml(f.label)}${extraInfo}</span>
      <span class="tf-value ${val ? 'has-value' : 'empty'} ${extraCls}" ${editable ? `onclick="event.stopPropagation();editTraumaTime('${c.id}','${f.key}','${escapeHtml(f.label)}',${isQuality ? 'true' : 'false'})"` : ''}>
        ${val ? escapeHtml(display) : (editable ? '點此填寫' : '—')}${editable && val ? ' ✏️' : ''}
      </span>
    </div>`;
  };

  return `<div class="time-fields">
    <div class="tf-header">⏱ 重大時間紀錄(全部可編輯,事後補登請改成實際時間)</div>
    ${TRAUMA_TIME_FIELDS.map(f => renderTimeRow(f, false)).join('')}
    ${TRAUMA_QUALITY_FIELDS.filter(f => tl[f.requiredKey] && tl[f.requiredKey] !== '-').map(f => renderTimeRow(f, true)).join('')}
  </div>`;
}

function formatTimeShort(val) {
  // "2026-05-04 10:25" → "5/4 10:25"
  const s = String(val);
  const m = s.match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}:\d{2})/);
  if (m) return `${parseInt(m[2])}/${parseInt(m[3])} ${m[4]}`;
  return s;
}

// 編輯/設定外傷時間點(統一函數,品質欄位會重算超時)
async function editTraumaTime(caseId, fieldKey, fieldLabel, isQuality) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const tl = c.timeline || {};
  const cur = tl[fieldKey] || '';
  const arrival = tl.arrival || '';

  // 預設值:現有值 / 抵院時間 / 現在時間
  const defaultVal = cur || nowStr().substring(0, 16);

  // 如果有抵院時間,提供「倒推」快速按鈕
  const arrivalQuickButtons = arrival ? `
    <div style="font-size:14px;color:var(--text2);margin-top:10px;">從抵院時間(${escapeHtml(formatTimeShort(arrival))})倒推:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
      <button type="button" onclick="setTimeFromArrival('${caseId}','${fieldKey}','${escapeHtml(fieldLabel)}',${isQuality ? 'true' : 'false'},5)">+5 分</button>
      <button type="button" onclick="setTimeFromArrival('${caseId}','${fieldKey}','${escapeHtml(fieldLabel)}',${isQuality ? 'true' : 'false'},10)">+10 分</button>
      <button type="button" onclick="setTimeFromArrival('${caseId}','${fieldKey}','${escapeHtml(fieldLabel)}',${isQuality ? 'true' : 'false'},15)">+15 分</button>
      <button type="button" onclick="setTimeFromArrival('${caseId}','${fieldKey}','${escapeHtml(fieldLabel)}',${isQuality ? 'true' : 'false'},30)">+30 分</button>
      <button type="button" onclick="setTimeFromArrival('${caseId}','${fieldKey}','${escapeHtml(fieldLabel)}',${isQuality ? 'true' : 'false'},60)">+60 分</button>
    </div>
  ` : '';

  // 拆 default 為 date / time
  const dParts = defaultVal.match(/^(\d{4}-\d{2}-\d{2})\s+(\d{2}:\d{2})/);
  const defaultDate = dParts ? dParts[1] : nowStr().substring(0, 10);
  const defaultTime = dParts ? dParts[2] : nowStr().substring(11, 16);

  showModal(`記錄 ${fieldLabel}`, `
    <div style="background:#fef3c7;color:#92400e;padding:10px 12px;border-radius:6px;font-size:15px;line-height:1.5;margin-bottom:10px;">
      💡 預設帶現在時間 — <strong>事後補登請改成實際時間</strong>,系統才能正確計算品質指標。
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
      <div>
        <label>日期</label>
        <input type="date" id="m-tt-date" value="${defaultDate}">
      </div>
      <div>
        <label>時間</label>
        <input type="time" id="m-tt-time" value="${defaultTime}" step="60">
      </div>
    </div>

    <div style="font-size:14px;color:var(--text2);margin-top:14px;">從現在倒推:</div>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;">
      <button type="button" onclick="setTimeQuickModal(0)">📍 現在</button>
      <button type="button" onclick="setTimeQuickModal(-5)">5 分鐘前</button>
      <button type="button" onclick="setTimeQuickModal(-10)">10 分鐘前</button>
      <button type="button" onclick="setTimeQuickModal(-30)">30 分鐘前</button>
      <button type="button" onclick="setTimeQuickModal(-60)">1 小時前</button>
      <button type="button" onclick="setTimeQuickModal(-120)">2 小時前</button>
      <button type="button" onclick="setTimeQuickModal(-240)">4 小時前</button>
    </div>

    ${arrivalQuickButtons}

    ${cur ? `<div style="margin-top:14px;padding-top:10px;border-top:1px dashed var(--border);">
      <button type="button" onclick="clearTraumaTime('${caseId}','${fieldKey}','${escapeHtml(fieldLabel)}')" style="background:transparent;color:var(--red-text);">✕ 清除這個時間</button>
    </div>` : ''}
  `, async () => {
    const date = document.getElementById('m-tt-date').value;
    const time = document.getElementById('m-tt-time').value;
    if (!date || !time) { toast('請填日期與時間'); return false; }
    const finalVal = `${date} ${time}`;
    return await applyTraumaTimeUpdate(caseId, fieldKey, fieldLabel, finalVal, isQuality);
  });
}

// 共用:更新 timeline 一個欄位
async function applyTraumaTimeUpdate(caseId, fieldKey, fieldLabel, finalVal, isQuality) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return false;
  const tl = c.timeline || {};
  const oldVal = tl[fieldKey] || '';
  const newTimeline = { ...tl, [fieldKey]: finalVal };

  // 品質欄位:重新計算超時 + 標記 confirmed(離開靜音模式)
  if (isQuality) {
    const qf = TRAUMA_QUALITY_FIELDS.find(f => f.key === fieldKey);
    if (qf && tl.arrival) {
      const arrivalDate = new Date(String(tl.arrival).replace(' ', 'T'));
      const actualDate = new Date(finalVal.replace(' ', 'T'));
      const diffMin = (actualDate - arrivalDate) / 60000;
      const required = parseInt(String(tl[qf.requiredKey]).match(/\d+/) ? String(tl[qf.requiredKey]).match(/\d+/)[0] : '0', 10);
      newTimeline[qf.statusKey] = (required > 0 && diffMin <= required) ? 'ontime' : 'late';
      newTimeline[qf.statusKey + '_confirmed'] = true; // 離開靜音模式
    }
  }

  // 樂觀更新
  c.timeline = newTimeline;
  refreshAll();

  const r = await api('updateCase', { caseId, updates: { timeline: newTimeline } });
  if (r && r.ok) {
    const oldDisplay = oldVal ? formatTimeShort(oldVal) : '無';
    const newDisplay = formatTimeShort(finalVal);
    api('addProgress', {
      caseId,
      text: oldVal
        ? `✏️ 修改時間:${fieldLabel} ${oldDisplay} → ${newDisplay}`
        : `⚙️ 設定時間:${fieldLabel} → ${newDisplay}`
    });
    toast(`已更新 ${fieldLabel}`);
    return true;
  } else {
    // revert
    c.timeline = tl;
    refreshAll();
    toast(r ? r.error : '更新失敗');
    return false;
  }
}

// modal 內快速按鈕:設成 N 分鐘前
function setTimeQuickModal(minutesAgo) {
  const d = new Date(Date.now() + minutesAgo * 60000);
  let dateStr, timeStr;
  try {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Asia/Taipei',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
    }).formatToParts(d).reduce((a, p) => (a[p.type] = p.value, a), {});
    dateStr = `${parts.year}-${parts.month}-${parts.day}`;
    timeStr = `${parts.hour}:${parts.minute}`;
  } catch (e) {
    const p = n => String(n).padStart(2, '0');
    dateStr = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    timeStr = `${p(d.getHours())}:${p(d.getMinutes())}`;
  }
  const dateEl = document.getElementById('m-tt-date');
  const timeEl = document.getElementById('m-tt-time');
  if (dateEl) dateEl.value = dateStr;
  if (timeEl) timeEl.value = timeStr;
}

// 從抵院時間倒推 N 分鐘 — 直接套用(不用按確認)
async function setTimeFromArrival(caseId, fieldKey, fieldLabel, isQuality, addMinutes) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const arrival = c.timeline && c.timeline.arrival;
  if (!arrival) { toast('沒有抵院時間,先填抵院時間'); return; }

  const arrivalDate = new Date(String(arrival).replace(' ', 'T'));
  const target = new Date(arrivalDate.getTime() + addMinutes * 60000);
  let dateStr, timeStr;
  try {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Asia/Taipei',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', hour12: false,
    }).formatToParts(target).reduce((a, p) => (a[p.type] = p.value, a), {});
    dateStr = `${parts.year}-${parts.month}-${parts.day}`;
    timeStr = `${parts.hour}:${parts.minute}`;
  } catch (e) {
    const p = n => String(n).padStart(2, '0');
    dateStr = `${target.getFullYear()}-${p(target.getMonth()+1)}-${p(target.getDate())}`;
    timeStr = `${p(target.getHours())}:${p(target.getMinutes())}`;
  }
  // 把 modal 內的欄位也改一下(讓使用者看到變化)
  const dateEl = document.getElementById('m-tt-date');
  const timeEl = document.getElementById('m-tt-time');
  if (dateEl) dateEl.value = dateStr;
  if (timeEl) timeEl.value = timeStr;
}

// 清除某個時間欄位
async function clearTraumaTime(caseId, fieldKey, fieldLabel) {
  if (!confirm(`確定清除「${fieldLabel}」?`)) return;
  closeModal();
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const tl = c.timeline || {};
  const newTimeline = { ...tl };
  delete newTimeline[fieldKey];
  // 如果是品質欄位,連 status 跟 confirmed 一起清
  const qf = TRAUMA_QUALITY_FIELDS.find(f => f.key === fieldKey);
  if (qf) {
    delete newTimeline[qf.statusKey];
    delete newTimeline[qf.statusKey + '_confirmed'];
  }
  c.timeline = newTimeline;
  refreshAll();
  const r = await api('updateCase', { caseId, updates: { timeline: newTimeline } });
  if (r && r.ok) {
    api('addProgress', { caseId, text: `🗑 清除時間:${fieldLabel}` });
    toast(`已清除 ${fieldLabel}`);
  } else {
    c.timeline = tl;
    refreshAll();
    toast(r ? r.error : '更新失敗');
  }
}

// 判斷一筆 progress 是不是「系統自動產生」(不是 leader 手寫的)
function isAutoProgress(text) {
  if (!text) return false;
  const t = String(text).trim();

  // (1) 開頭 emoji 識別 — 自動勾選/取消/標記/編輯/採購/封緘/刪除等
  const autoPrefixes = ['✓ ', '✗ ', '⚙️ ', '✏️ ', '📦 ', '♻️ ', '🛒 ', '🔔 ', '📎 ', '🗑 ', '✅ '];
  if (autoPrefixes.some(p => t.indexOf(p) === 0)) return true;

  // (2) 系統行為純文字 — 不一定有 emoji
  const autoPhrases = [
    '建立案件',
    '送出批准',
    '退回繼續處理',
    '批准封緘',
    '刪除一筆進度紀錄',
    '已採購', '已到貨', '不採購',
    '統一採購', '採購中',
    '同意採購', '不同意採購',
    '案件已歸檔',
    '升 Tier', '降 Tier',
    '轉為重大異常',
    '外傷醫師到場',  // 「外傷醫師到場 09:43(10 分鐘)」這種
    '社工到場',
  ];
  if (autoPhrases.some(phr => t.indexOf(phr) >= 0)) return true;

  return false;
}

function progressHTML(p, caseId, caseClosed) {
  if (!p || !p.length) return '';
  const me = state.user && state.user.displayName;

  // 區分系統自動 vs 主動加註,各自反序(最新在上)
  const sortedAll = p.slice().reverse(); // 最新在前
  const userNotes = sortedAll.filter(x => !isAutoProgress(x.text));
  const autoNotes = sortedAll.filter(x => isAutoProgress(x.text));

  const renderRow = (x) => {
    const canDelete = !caseClosed && (x.who === me || isApprover()) && !isReadOnly();
    const delBtn = canDelete && caseId
      ? `<button class="p-del" onclick="deleteProgress('${caseId}', ${JSON.stringify(x.time).replace(/"/g, '&quot;')}, ${JSON.stringify(x.who).replace(/"/g, '&quot;')}, ${JSON.stringify(x.text).replace(/"/g, '&quot;')})" title="刪除這筆">×</button>`
      : '';
    return `<div class="p-row"><span class="p-time">${escapeHtml(x.time)}</span><span class="p-who">${escapeHtml(x.who)}</span> · ${escapeHtml(x.text)}${delBtn}</div>`;
  };

  let html = '<div class="progress">';

  // 主動加註(最多顯示 3 筆,沒有就顯示提示)
  if (userNotes.length === 0 && autoNotes.length === 0) {
    html += '</div>';
    return html;
  }

  if (userNotes.length > 0) {
    const showCnt = Math.min(3, userNotes.length);
    html += userNotes.slice(0, showCnt).map(renderRow).join('');
    if (userNotes.length > 3) {
      html += `<div class="p-row" style="color:var(--text3);">…還有 ${userNotes.length-3} 筆主動加註</div>`;
    }
  }

  // 系統自動紀錄折疊區(預設摺疊,只顯示「系統紀錄 N 筆 ▾」)
  if (autoNotes.length > 0 && caseId) {
    const expanded = !!(state.expandedAutoProgress && state.expandedAutoProgress[caseId]);
    html += `<div class="auto-progress-toggle" onclick="event.stopPropagation();toggleAutoProgress('${caseId}')" style="cursor:pointer;color:var(--text3);font-size:14px;padding:4px 0;border-top:1px dashed var(--border);margin-top:4px;">
      ${expanded ? '▾' : '▸'} 系統自動紀錄 ${autoNotes.length} 筆 ${expanded ? '(點擊收起)' : '(點擊展開)'}
    </div>`;
    if (expanded) {
      html += '<div class="auto-progress-list" style="opacity:0.75;">';
      html += autoNotes.map(renderRow).join('');
      html += '</div>';
    }
  } else if (autoNotes.length > 0) {
    // 沒 caseId(罕見)→ 直接顯示但灰
    html += '<div class="auto-progress-list" style="opacity:0.6;">';
    html += autoNotes.slice(0, 2).map(renderRow).join('');
    if (autoNotes.length > 2) html += `<div class="p-row" style="color:var(--text3);">…系統紀錄 ${autoNotes.length} 筆</div>`;
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function toggleAutoProgress(caseId) {
  if (!state.expandedAutoProgress) state.expandedAutoProgress = {};
  state.expandedAutoProgress[caseId] = !state.expandedAutoProgress[caseId];
  renderPanes();
}

function actionsHTML(c) {
  // SV 督導:只看不能改 → 顯示提示橫條,沒有任何按鈕
  if (isReadOnly()) {
    return `<div style="background:#f3f4f6;color:var(--text2);padding:8px 14px;border-radius:6px;font-size:16px;text-align:center;border:1px dashed var(--border2);">👁 督導視角 — 唯讀模式</div>`;
  }

  // 哪些類別開放 AI 諮詢
  const aiAdviceCats = ['event', 'complaint', 'clinical', 'vip', 'mci', 'infection'];
  const showAiBtn = aiAdviceCats.indexOf(c.cat) >= 0;
  // 病人離院子類也要有
  const isRunaway = c.cat === 'event' && c.subType === '病人異常離院';

  // 編輯按鈕:目前 owner / approver 可見,封緘鎖死
  const canEditCase = c.state !== 'closed' && (
    isApprover() ||
    (state.user && c.owner === state.user.displayName)
  );
  const editBtn = canEditCase ? `<button onclick="openEditCase('${c.id}')" title="修改案件內容">✏️ 編輯</button>` : '';

  // 等護理長裁示(報廢採購建議)
  if (c.state === 'need_decision') {
    return `<div class="actions">
      ${isApprover()
        ? `<button class="primary" onclick="approveDisposal('${c.id}')">同意採購,進採購中</button>
           <button onclick="rejectDisposal('${c.id}')">不採購,直接結案</button>
           <button onclick="markBatchPurchase('${c.id}')" title="此項目走統一採購流程,案件直接封緘">🛒 走統一採購,直接封緘</button>
           <button onclick="returnDisposal('${c.id}')">退回繼續處理</button>`
        : `<button disabled>等護理長裁示中...</button>`}
      ${editBtn}
      <button class="danger" onclick="archiveCase('${c.id}')">歸檔</button>
    </div>`;
  }

  // 採購中
  if (c.state === 'purchasing') {
    return `<div class="actions">
      <button onclick="openAddProgress('${c.id}')">加註進度(例:廠商已下單)</button>
      <button class="primary" onclick="goodsArrived('${c.id}')">📦 貨到了 → 送批准</button>
      <button class="${announce(c) ? 'announce-btn-active' : ''}" onclick="toggleAnnounce('${c.id}')">${announce(c) ? '🔔 已標宣導' : '🔔 標為宣導'}</button>
      ${editBtn}
      <button class="danger" onclick="archiveCase('${c.id}')">歸檔</button>
    </div>`;
  }

  if (c.state === 'pending_approval') {
    const isOwner = state.user && c.owner === state.user.displayName;
    const canApprove = isApprover();
    let recallBtn = '';
    if (isOwner && !canApprove) {
      recallBtn = `<button onclick="unsubmit('${c.id}')" title="撤回送批准,案件回到處理中">↩️ 撤回</button>`;
    } else if (canApprove && !isOwner) {
      recallBtn = `<button onclick="unsubmit('${c.id}')" title="退回給送出人補件">↩️ 退回補件</button>`;
    } else if (isOwner && canApprove) {
      // 自己送、自己也是審核者
      recallBtn = `<button onclick="unsubmit('${c.id}')" title="撤回送批准">↩️ 撤回</button>`;
    }
    return `<div class="actions">
      ${canApprove
        ? `<button class="primary" onclick="approveCase('${c.id}')">批准封緘</button>`
        : `<button disabled>需護理長/副護理長批准</button>`}
      ${recallBtn}
      ${showAiBtn || isRunaway ? `<button onclick="openCaseAdvice('${c.id}')"><span class="ai-tag">AI</span>諮詢建議</button>` : ''}
      ${editBtn}
      <button class="danger" onclick="archiveCase('${c.id}')">歸檔</button>
    </div>`;
  }
  const ready = allChecked(c);
  const announce_flag = announce(c);
  return `<div class="actions">
    <button onclick="openAddProgress('${c.id}')">加註進度</button>
    <button class="${announce_flag ? 'announce-btn-active' : ''}" onclick="toggleAnnounce('${c.id}')">${announce_flag ? '🔔 已標宣導' : '🔔 標為宣導'}</button>
    ${showAiBtn || isRunaway ? `<button onclick="openCaseAdvice('${c.id}')"><span class="ai-tag">AI</span>諮詢建議</button>` : ''}
    ${c.cat === 'complaint' && (c.tier === 1 || c.tier === '1') ? `<button class="danger" onclick="escalateTier('${c.id}')">升 Tier 2</button>` : ''}
    ${c.cat === 'complaint' && (c.tier === 2 || c.tier === '2') ? `<button class="danger" onclick="convertToEvent('${c.id}')">轉重大異常</button>` : ''}
    <button class="${ready ? 'primary' : ''}" onclick="submitForApproval('${c.id}')">送批准</button>
    ${editBtn}
    <button class="danger" onclick="archiveCase('${c.id}')">歸檔</button>
  </div>`;
}

// 小 helper:檢查是否標宣導
function announce(c) {
  return !!(c.flags && c.flags.announce);
}

// 同意採購 → state: purchasing,waitingFor: 已採購,等到貨
async function approveDisposal(caseId) {
  if (!confirm('同意採購?\n\n案件會進入「已採購,等到貨」狀態。\n採購到貨後人員按「貨到了」即可送批准。')) return;
  const r = await api('updateCase', { caseId, updates: { state: 'purchasing', waitingFor: '已採購,等到貨' } });
  if (r && r.ok) {
    appendProgressNote(caseId, '✅ 護理長同意報廢採購,已下單');
    toast('已進入「已採購」');
    refreshAll();
  } else toast(r ? r.error : '失敗');

// 取現在時間字串(yyyy-mm-dd hh:mm:ss,強制台灣時區)
function nowStr() {
  // 用 Intl 強制台北時區,即使瀏覽器在別處也對
  const d = new Date();
  try {
    const parts = new Intl.DateTimeFormat('en-CA', {
      timeZone: 'Asia/Taipei',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit', second: '2-digit',
      hour12: false,
    }).formatToParts(d).reduce((a, p) => (a[p.type] = p.value, a), {});
    return `${parts.year}-${parts.month}-${parts.day} ${parts.hour}:${parts.minute}:${parts.second}`;
  } catch (e) {
    // fallback: 用瀏覽器時區
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`;
  }
}

async function toggleCheck(caseId, itemId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const wasOpen = c.state === 'open';
  const item = (c.checklist || []).find(it => it.id === itemId);
  if (!item) return;
  const willCheck = !item.done;

  // 重要 checklist:勾下去前先確認(避免誤勾)
  if (c.cat === 'repair' && (itemId === 'completed' || itemId === 'disposal') && willCheck) {
    const msg = itemId === 'completed'
      ? '勾「維修完成」會自動送批准,確定?'
      : '勾「已報廢,等採購」會送護理長裁示,確定?';
    if (!confirm(msg)) return;
  }

  // 重大異常:不成案勾下去前先確認
  if (c.cat === 'event' && itemId === 'not_case' && willCheck) {
    // 若已勾任一 investigation 項目,提示會被清除
    const investigationItems = (c.checklist || []).filter(it => it.group === 'investigation');
    const checkedInvestigation = investigationItems.filter(it => it.done);
    let msg = '勾「不成案」會以「撤銷通報」結案,確定?';
    if (checkedInvestigation.length) {
      msg += `\n\n注意:上方已勾選的 ${checkedInvestigation.map(it => it.label).join('、')} 將被清除。`;
    }
    if (!confirm(msg)) return;
  }

  // 樂觀更新:立刻翻轉視覺(不等後端)
  item.done = willCheck;
  // 重大異常互斥處理:勾不成案 → 清空 investigation;勾 investigation 任一 → 清空不成案
  let extraClears = [];
  if (c.cat === 'event' && willCheck) {
    if (itemId === 'not_case') {
      extraClears = (c.checklist || []).filter(it => it.group === 'investigation' && it.done);
    } else if (item.group === 'investigation') {
      const notCaseItem = (c.checklist || []).find(it => it.id === 'not_case' && it.done);
      if (notCaseItem) extraClears = [notCaseItem];
    }
    extraClears.forEach(it => { it.done = false; });
  }
  // 部分重新渲染 — 找到該 checklist 區塊重畫
  const els = document.querySelectorAll(`[onclick*="toggleCheck('${caseId}','${itemId}')"]`);
  els.forEach(el => {
    el.classList.toggle('done', item.done);
  });

  // 背景同步
  const r = await api('toggleCheck', { caseId, itemId });
  if (!r || !r.ok) {
    // revert
    item.done = !willCheck;
    extraClears.forEach(it => { it.done = true; });
    els.forEach(el => el.classList.toggle('done', item.done));
    toast(r ? r.error : '更新失敗');
    return;
  }
  // 額外清除的項目也要同步到後端
  for (const cleared of extraClears) {
    await api('toggleCheck', { caseId, itemId: cleared.id });
  }

  // 提示訊息
  if (c.cat === 'repair' && wasOpen && willCheck) {
    if (itemId === 'completed') toast('✅ 維修完成,已自動送批准');
    else if (itemId === 'disposal') toast('♻️ 已報廢,等護理長裁示是否採購');
  }
  if (c.cat === 'repair' && !willCheck) {
    if (itemId === 'completed' && c.state === 'pending_approval') toast('已取消維修完成,案件回到處理中');
    else if (itemId === 'disposal' && c.state === 'need_decision') toast('已取消報廢建議,案件回到處理中');
  }
  if (c.cat === 'event' && itemId === 'not_case' && willCheck) {
    toast('❎ 已標記不成案,記得手動送批准結案');
  }
  refreshAll();
}

async function unsubmit(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  // 權限:送出人(owner) 或 審核者(approver) 才能撤回
  const isOwner = state.user && c.owner === state.user.displayName;
  const canApprove = isApprover();
  if (!isOwner && !canApprove) {
    toast('只有送出人或護理長/副護理長可撤回');
    return;
  }
  // 依角色顯示不同確認文字
  const isSelfRecall = isOwner && !canApprove;       // 純送出人(非審核者)→ 自己撤回
  const isApproverReturn = canApprove && !isOwner;   // 審核者退回他人送的 → 退回補件
  const isBoth = isOwner && canApprove;              // 自己送、自己也是審核者 → 視為撤回
  const msg = (isApproverReturn)
    ? '退回給送出人補件?\n\n案件會回到「處理中」,送出人可繼續編輯後再送批准。'
    : '撤回送批准?\n\n案件會回到「處理中」,可以繼續編輯後再送一次。';
  if (!confirm(msg)) return;
  const r = await api('unsubmit', { caseId });
  if (r && r.ok) {
    const noteText = isApproverReturn
      ? `↩️ 護理長退回補件 (操作者:${state.user.displayName})`
      : `↩️ 撤回送批准 (操作者:${state.user.displayName})`;
    appendProgressNote(caseId, noteText);
    toast(isApproverReturn ? '已退回' : '已撤回');
    refreshAll();
  } else toast(r ? r.error : '失敗');
}

  const d = new Date();
  let todayStr, nowTime;
  try {

      timeZone: 'Asia/Taipei',
      year: 'numeric', month: '2-digit', day: '2-digit',
      hour: '2-digit', minute: '2-digit',
      hour12: false,
    }).formatToParts(d).reduce((a, p) => (a[p.type] = p.value, a), {});
    todayStr = `${parts.year}-${parts.month}-${parts.day}`;
    nowTime = `${parts.hour}:${parts.minute}`;
  } catch (e) {
    const p = n => String(n).padStart(2, '0');
    todayStr = `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`;
    nowTime = `${p(d.getHours())}:${p(d.getMinutes())}`;

  const text = document.getElementById('m-pi-raw').value.trim();

  if (text.length > 8000) { toast('文字過長,請精簡'); return; }

  if (!confirm('確認:你已從文字中刪除「姓名、身分證號、病歷號」等個資?\n\n貼上的原文不會被儲存,只會用於這次 AI 解析。')) return;

async function parseTriageImage(caseId) {
  const fi = document.getElementById('m-pi-image');
  if (!fi || !fi.files || !fi.files[0]) { toast('請先選擇或拍攝圖片'); return; }
  const file = fi.files[0];

  if (!confirm('確認:照片中的姓名、身分證號、病歷號已遮蔽?\n\n圖片不會被儲存到系統,僅在解析當下傳給 Gemini AI 處理,結果回傳後立即釋放。')) return;

  document.getElementById('m-pi-parsing').style.display = 'block';
  document.getElementById('m-pi-parsing').textContent = '壓縮並解析中,需 5–15 秒...';

  try {
    // 自動壓縮(長邊縮到 1600px,JPEG 85%),確保穩定上傳
    const compressed = await compressImage(file, 1600, 0.85);
    const fileBase64 = await blobToBase64(compressed);

    if (fileBase64.length > 7000000) {
      document.getElementById('m-pi-parsing').style.display = 'none';
      toast('圖片仍過大,請拍清楚一點再縮小範圍');
      return;
    }

    const r = await api('parseTriage', {
      caseId,
      imageBase64: fileBase64,
      imageMimeType: 'image/jpeg',
    });
    document.getElementById('m-pi-parsing').style.display = 'none';
    document.getElementById('m-pi-parsing').textContent = '解析中,請稍候...';

    if (!r || !r.ok) { toast(r ? r.error : '解析失敗'); return; }
    applyParsedFields(r.parsed || {});

    // 立即釋放圖片(降低殘留風險)
    fi.value = '';
    document.getElementById('m-pi-image-preview').innerHTML = '';
    toast('解析完成,圖片已釋放,請檢查內容');
  } catch (e) {
    document.getElementById('m-pi-parsing').style.display = 'none';
    toast('解析失敗:' + e.message);
  }
}

// 圖片壓縮(用 Canvas 縮小 + 重新編 JPEG)
function compressImage(file, maxSize, quality) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      let { width, height } = img;
      if (width > height) {
        if (width > maxSize) { height = Math.round(height * maxSize / width); width = maxSize; }
      } else {
        if (height > maxSize) { width = Math.round(width * maxSize / height); height = maxSize; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = width;
      canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      canvas.toBlob(blob => {
        URL.revokeObjectURL(url);
        if (!blob) return reject(new Error('壓縮失敗'));
        resolve(blob);
      }, 'image/jpeg', quality);
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('讀圖失敗')); };
    img.src = url;
  });
}

function blobToBase64(blob) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(blob);
  });
}

function applyParsedFields(p) {
  function setIfEmpty(id, val) {
    const el = document.getElementById(id);
    if (el && val && !el.value.trim()) el.value = val;
  }
  setIfEmpty('m-pi-bed',    p.bed);
  setIfEmpty('m-pi-demo',   p.demographic);
  setIfEmpty('m-pi-vs',     p.vitalSigns);
  setIfEmpty('m-pi-cc',     p.chiefComplaint);
  setIfEmpty('m-pi-mob',    p.mobility);
  setIfEmpty('m-pi-comp',   p.companion);
  setIfEmpty('m-pi-trans',  p.transferStatus);
  setIfEmpty('m-pi-pmh',    p.pmh);
  setIfEmpty('m-pi-travel', p.travelHx);
  setIfEmpty('m-pi-dx',     p.dx);
  setIfEmpty('m-pi-mgmt',   p.management);
  setIfEmpty('m-pi-timing', p.timing);
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => {
      const result = reader.result;
      // result is "data:mime;base64,XXXX",取後半
      const base64 = result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function runCaseAdvice(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const question = document.getElementById('advice-q').value.trim();

  // 確認沒個資
  if (!confirm('確認 detail / 進度紀錄中沒有寫病人姓名、ID、病歷號?\n\nAI 建議會引用這些資料,若有可識別資訊將傳到 Gemini API。')) return;

  document.getElementById('advice-loading').style.display = 'block';
  document.getElementById('advice-result').innerHTML = '';

  const r = await api('caseAdvice', { caseId, question });
  document.getElementById('advice-loading').style.display = 'none';

  if (!r || !r.ok) {
    document.getElementById('advice-result').innerHTML = `<div class="empty" style="color:var(--red-text);margin-top:12px;">${r ? escapeHtml(r.error) : '失敗'}</div>`;
    return;
  }

  const a = r.advice;
  let html = `<div class="advice-result">`;

  if (a.summary) {
    html += `<div class="advice-section">
      <div class="advice-h">📋 AI 觀察</div>
      <div class="advice-body">${escapeHtml(a.summary)}</div>
    </div>`;
  }

  if (a.actions && a.actions.length) {
    html += `<div class="advice-section">
      <div class="advice-h">💡 建議步驟</div>
      ${a.actions.map((x, i) => {
        const u = x.urgency || 'med';
        const uClass = u === 'high' ? 'st-wait' : u === 'low' ? 'st-active' : '';
        const uLabel = u === 'high' ? '🔴 緊急' : u === 'low' ? '🟢 一般' : '🟡 重要';
        return `<div class="advice-action">
          <div class="advice-action-num">${i+1}</div>
          <div style="flex:1;">
            <div class="advice-action-step">${escapeHtml(x.step||'')}</div>
            ${x.rationale ? `<div class="advice-action-reason">${escapeHtml(x.rationale)}</div>` : ''}
          </div>
          <span class="badge ${uClass}">${uLabel}</span>
        </div>`;
      }).join('')}
    </div>`;
  }

  if (a.warnings && a.warnings.length) {
    html += `<div class="advice-section advice-warning">
      <div class="advice-h">🚨 特別注意</div>
      <ul style="margin-left:22px;font-size:21px;line-height:1.7;">
        ${a.warnings.map(w => `<li>${escapeHtml(w)}</li>`).join('')}
      </ul>
    </div>`;
  }

  if (a.needsHumanJudgement && a.needsHumanJudgement.length) {
    html += `<div class="advice-section advice-human">
      <div class="advice-h">👤 需人為決策</div>
      <ul style="margin-left:22px;font-size:21px;line-height:1.7;">
        ${a.needsHumanJudgement.map(w => `<li>${escapeHtml(w)}</li>`).join('')}
      </ul>
    </div>`;
  }

  if (a.similarRefs && a.similarRefs.length) {
    html += `<div class="advice-section">
      <div class="advice-h">📚 過去類似案件參考(${r.similarCount} 件中,AI 挑出最相關的)</div>
      ${a.similarRefs.map(s => `<div class="advice-similar">
        <div style="font-weight:600;">▸ ${escapeHtml(s.title||'')}</div>
        ${s.lesson ? `<div style="font-size:19px;color:var(--text2);margin-top:4px;">💡 ${escapeHtml(s.lesson)}</div>` : ''}
      </div>`).join('')}
    </div>`;
  }

  html += `<div style="font-size:16px;color:var(--text3);margin-top:14px;text-align:center;">
    ⚠️ 以上為 AI 建議,實際處置依臨床判斷
  </div></div>`;

  document.getElementById('advice-result').innerHTML = html;
}

    if (a.priority !== cur) {
      html += `<div class="qa-item qa-warn">
        💡 <strong>優先度建議</strong>:你選 ${cur === 'high' ? '高' : cur === 'low' ? '低' : '中'},AI 建議改為「${a.priority === 'high' ? '高' : a.priority === 'low' ? '低' : '中'}」 — ${escapeHtml(a.priorityReason||'')}
        <button class="qa-apply" onclick="document.getElementById('m-priority').value='${a.priority}';this.parentElement.style.opacity=0.5;this.textContent='已套用';this.disabled=true;">套用</button>
      </div>`;
    }
  }

  if (a.extraChecklist && a.extraChecklist.length) {
    html += `<div class="qa-item">
      📋 <strong>建議補充 checklist</strong>:
      <ul style="margin-left:24px;margin-top:4px;">
        ${a.extraChecklist.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
      </ul>
      <div style="font-size:14px;color:var(--text3);margin-top:4px;">(送出後可在卡片中手動補上)</div>
    </div>`;
  }

  if (a.alerts && a.alerts.length) {
    html += `<div class="qa-item qa-alert">
      🚨 <strong>立即注意</strong>:
      <ul style="margin-left:24px;margin-top:4px;">
        ${a.alerts.map(x => `<li>${escapeHtml(x)}</li>`).join('')}
      </ul>
    </div>`;
  }

  if (!html.includes('qa-item')) {
    html += `<div class="qa-item" style="color:var(--green-text);">✓ AI 看了一下,沒有特別建議,可以直接送出</div>`;
  }

  html += '</div>';
  if (target) target.innerHTML = html;
}

// ====== 歸檔 / 還原 / 刪除進度 ======
async function archiveCase(caseId) {
  const c = state.cases.find(x => x.id === caseId);
  if (!c) return;
  const msg = c.state === 'closed'
    ? `將「${c.title}」歸檔?\n\n已封緘案件歸檔後僅可由護理長/副護理長還原。`
    : `將「${c.title}」歸檔?\n\n• 案件會從清單隱藏\n• 進度紀錄、附件保留在資料表\n• 隨時可在「已歸檔」分頁找到並還原`;
  if (!confirm(msg)) return;
  const r = await api('archiveCase', { caseId });
  if (!r) { toast('歸檔失敗:無回應'); return; }
  if (r.ok) {
    toast('已歸檔');
    // 立即從前端清掉,避免使用者覺得沒反應
    state.cases = state.cases.filter(x => x.id !== caseId);
    renderAll();
    // 然後再從後端重新拉一次確認
    setTimeout(() => refreshAll(), 500);
  } else {
    toast('歸檔失敗:' + (r.error || '未知錯誤'));
  }
}

async function restoreCase(caseId) {
  if (!confirm('還原此案件?案件會回到原本的分頁。')) return;
  const r = await api('restoreCase', { caseId });
  if (r && r.ok) { toast('已還原'); refreshAll(); }
  else toast(r ? r.error : '還原失敗');
}

async function deleteProgress(caseId, time, who, text) {
  if (!confirm(`刪除這筆進度紀錄?\n\n"${who} · ${text}"\n\n此動作不可還原(會留下審計紀錄)。`)) return;
  const r = await api('deleteProgress', { caseId, time, who, text });
  if (r && r.ok) { toast('已刪除'); refreshAll(); }
  else toast(r ? r.error : '刪除失敗');
}

async function renderArchivedPane() {
  const root = document.getElementById('pane-archived');
  root.innerHTML = '<div class="loading">載入已歸檔案件...</div>';
  // 取得包含已刪除的清單
  const r = await api('listAll', { includeDeleted: 'true' });
  if (!r || !r.ok) { root.innerHTML = '<div class="empty">載入失敗</div>'; return; }

  const archived = (r.cases || []).filter(c => String(c.deleted || '') === 'yes')
    .sort((a, b) => String(b.deletedAt || '').localeCompare(String(a.deletedAt || '')));

  if (!archived.length) {
    root.innerHTML = `<div class="empty" style="font-size:18px;padding:40px;">目前沒有歸檔案件</div>`;
    return;
  }

  const html = `
    <div style="font-size:14px;color:var(--text2);margin-bottom:12px;">
      共 ${archived.length} 筆已歸檔。歸檔僅是隱藏,資料完整保留在試算表中。
    </div>
    ${archived.map(c => {
      const catLabel = (CATS.find(x => x.id === c.cat) || { label: c.cat }).label;
      return `
        <div class="card closed" style="opacity:0.85;">
          <div class="card-top">
            <div style="flex:1;min-width:0;">
              <div class="card-title">${escapeHtml(c.title)}</div>
              <div class="card-meta">[${escapeHtml(catLabel)}] ${escapeHtml(c.subType || '')} · 取得 ${escapeHtml(String(c.created).split(' ')[0])}</div>
            </div>
            <span class="badge b-gray">已歸檔</span>
          </div>
          <div class="card-meta" style="margin-top:8px;">歸檔於 ${escapeHtml(c.deletedAt || '')} · ${escapeHtml(c.deletedBy || '')}</div>
          <div class="actions" style="margin-top:10px;">
            <button class="primary" onclick="restoreCase('${c.id}')">↩️ 還原</button>

    }).join('')}

  root.innerHTML = html;
}

function applyDashboardCountSince() {
  if (!isApprover()) { toast('僅護理長/副護理長可設定'); return; }
  const v = document.getElementById('s-count-since').value;
  if (!v) { toast('請選擇日期'); return; }
  const todayStr = nowStr().substring(0, 10);
  if (v > todayStr) {
    if (!confirm('起算日在未來,所有卡片數字都會變 0,確定?')) return;
  }
  setDashboardCountSince(v);
  toast('已套用,Dashboard 已更新');
  renderSettingsPane();
  renderSummary();
}

// Dashboard 計數起算日:清除
function clearDashboardCountSince() {
  if (!isApprover()) { toast('僅護理長/副護理長可設定'); return; }
  if (!confirm('清除起算日,Dashboard 卡片回到顯示全部歷史?')) return;
  setDashboardCountSince('');
  toast('已清除,顯示全部歷史');
  renderSettingsPane();
  renderSummary();
}

async function changeMyPassword() {
  const oldPwd = document.getElementById('s-old').value;
  const new1 = document.getElementById('s-new1').value;
  const new2 = document.getElementById('s-new2').value;
  if (!oldPwd || !new1 || !new2) { toast('請填寫所有欄位'); return; }
  if (new1 !== new2) { toast('兩次新密碼不一致'); return; }
  if (new1.length < 4) { toast('新密碼至少 4 字元'); return; }
  if (new1 === oldPwd) { toast('新舊密碼相同'); return; }
  const r = await api('changeMyPassword', { oldPassword: oldPwd, newPassword: new1 });
  if (r && r.ok) {
    toast('密碼已變更,請重新登入');
    document.getElementById('s-old').value = '';
    document.getElementById('s-new1').value = '';
    document.getElementById('s-new2').value = '';
    setTimeout(() => doLogout(true), 1500);
  } else toast(r ? r.error : '失敗');
}
