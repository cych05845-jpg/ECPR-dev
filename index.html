}

function switchSearchMode(mode) {
  _searchMode = mode;
  document.getElementById('st-normal').classList.toggle('active', mode==='normal');
  document.getElementById('st-ai').classList.toggle('active', mode==='ai');
  document.getElementById('search-normal').style.display = mode==='normal'?'block':'none';
  document.getElementById('search-ai').style.display = mode==='ai'?'block':'none';
}

async function doSearch() {
  const params = {
    keyword: document.getElementById('sn-kw').value.trim(),
    cat: document.getElementById('sn-cat').value,
    days: document.getElementById('sn-days').value,
    state: document.getElementById('sn-state').value,
  };
  const outcome = document.getElementById('sn-outcome').value; // '' / 'not_case' / 'case'
  const root = document.getElementById('search-results');
  root.innerHTML = '<div class="loading">搜尋中...</div>';
  const r = await api('searchCases', { params });
  if (!r || !r.ok) { root.innerHTML = '<div class="empty">搜尋失敗</div>'; return; }
  // 結案路徑前端二次篩選(不動 GAS,因 not_case 在 checklist 內部需要解析)
  let results = r.results || [];
  let total = r.total;
  let filteredNote = '';
  if (outcome && results.length) {
    const before = results.length;
    if (outcome === 'not_case') {
      results = results.filter(c => isNotCase(c));
    } else if (outcome === 'case') {
      // 成案 = 重大異常 且 沒勾不成案
      results = results.filter(c => c.cat === 'event' && !isNotCase(c));
    }
    total = results.length;
    filteredNote = ` · 已套用結案路徑篩選(${before} → ${total})`;
  }
  if (!results.length) {
    root.innerHTML = '<div class="empty" style="font-size:18px;padding:30px;">沒有找到符合的案件,試試放寬條件</div>';
    return;
  }
  root.innerHTML = `
    <div style="font-size:18px;color:var(--text2);margin-bottom:12px;">
      找到 ${total} 筆${r.truncated ? '(僅顯示最新 100 筆,請增加篩選條件)' : ''}${filteredNote}
    </div>
    ${results.map(c => searchResultCard(c)).join('')}
  `;
}

function searchResultCard(c) {
  const catLabel = (CATS.find(x => x.id === c.cat) || { label: c.cat }).label;
  const stateBadge = c.state === 'closed' ? '<span class="badge b-gray">已封緘</span>'
                    : c.state === 'pending_approval' ? '<span class="badge b-amber">待批准</span>'
                    : '<span class="badge b-green">處理中</span>';
  const archivedBadge = String(c.deleted) === 'yes' ? '<span class="badge b-gray">已歸檔</span>' : '';
  const notCaseBadge = isNotCase(c) ? '<span class="badge badge-notcase">❎ 不成案</span>' : '';
  const lastP = c.progress && c.progress.length ? c.progress[c.progress.length-1] : null;
  return `
    <div class="card" style="cursor:pointer;" onclick="jumpToCaseFromSearch('${c.cat}','${c.id}','${String(c.deleted)==='yes'}')">
      <div class="card-top">
        <div style="flex:1;min-width:0;">
          <div class="card-title">${escapeHtml(c.title)}</div>
          <div class="card-meta">[${escapeHtml(catLabel)}] ${escapeHtml(c.subType||'')} · ${escapeHtml(String(c.created).split(' ')[0])}</div>
        </div>
        <div class="badges">${stateBadge}${notCaseBadge}${archivedBadge}</div>
      </div>
      ${c.detail ? `<div class="card-body" style="font-size:18px;color:var(--text2);">${escapeHtml(c.detail).substring(0, 150)}${c.detail.length > 150 ? '...' : ''}</div>` : ''}
      ${lastP ? `<div style="font-size:18px;color:var(--text2);margin-top:8px;">▸ ${escapeHtml(lastP.text)}</div>` : ''}
    </div>
  `;
}

function jumpToCaseFromSearch(cat, id, isArchived) {
  if (isArchived === 'true') {
    switchTab('archived');
    setTimeout(() => highlightCard(id), 300);
  } else {
    switchTab(cat);
    setTimeout(() => highlightCard(id), 300);
  }
}

function highlightCard(caseId) {
  const cards = document.querySelectorAll('.card');
  cards.forEach(card => {
    if (card.innerHTML.indexOf(`'${caseId}'`) >= 0 || card.innerHTML.indexOf(`"${caseId}"`) >= 0) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      card.classList.add('card-highlight');
      setTimeout(() => card.classList.remove('card-highlight'), 2400);
    }
  });
}

async function doAiSearch() {
  const question = document.getElementById('sa-q').value.trim();
  const days = document.getElementById('sa-days').value;
  if (!question) { toast('請輸入問題'); return; }

  const root = document.getElementById('ai-results');
  root.innerHTML = `<div class="loading"><span class="ai-tag">AI</span>分析中,約 5–15 秒...</div>`;

  const r = await api('aiSearch', { question, days });
  if (!r || !r.ok) {
    root.innerHTML = `<div class="empty">${r ? escapeHtml(r.error) : '分析失敗'}</div>`;
    return;
  }

  const relevantCases = (r.relevantCaseIds || [])
    .map(id => state.cases.find(c => c.id === id))
    .filter(Boolean);

  let html = `
    <div class="ai-result">
      <div class="ai-summary">
        <div class="ai-h">📋 分析摘要</div>
        <div class="ai-body">${escapeHtml(r.summary || '')}</div>
        <div style="font-size:16px;color:var(--text3);margin-top:8px;">分析了過去 ${r.daysRange} 天共 ${r.totalCases} 筆案件</div>
      </div>
  `;

  if (r.patterns && r.patterns.length) {
    html += `<div class="ai-section">
      <div class="ai-h">🔍 共通模式</div>
      <ul class="ai-list">
        ${r.patterns.map(p => `<li>${escapeHtml(p)}</li>`).join('')}
      </ul>
    </div>`;
  }

  if (r.recommendations && r.recommendations.length) {
    html += `<div class="ai-section ai-recommend">
      <div class="ai-h">💡 改善建議</div>
      <ul class="ai-list">
        ${r.recommendations.map(rec => `<li>${escapeHtml(rec)}</li>`).join('')}
      </ul>
    </div>`;
  }

  if (relevantCases.length) {
    html += `<div class="ai-section">
      <div class="ai-h">📂 相關案件 (${relevantCases.length})</div>
      ${relevantCases.map(c => searchResultCard(c)).join('')}
    </div>`;
  }

  html += `<div style="font-size:14px;color:var(--text3);margin-top:12px;text-align:center;">
    ⚠️ AI 分析僅供參考,請以實際案件內容為準
  </div></div>`;

  root.innerHTML = html;
}

function defaultChecklist(catId, opts) {
  // 兼容舊呼叫(只傳 tier)
  if (typeof opts === 'number' || opts === null || opts === undefined) {
    opts = { tier: opts };
  }
  const tier = opts.tier;
  const affiliation = opts.affiliation;
  const subType = opts.subType;

  // 請假:依歸屬切換
  if (catId === 'leave') {
    if (affiliation === 'other_unit' || affiliation === 'non_nursing') {
      return [
        { id: 'documented',  label: '記錄事件',                         done: false },
        { id: 'notified',    label: '已通報夜護 / 該單位主管',          done: false },
        { id: 'handover',    label: '已交接給該單位後續處理 (選填)',    done: false, optional: true },
      ];
    }
    return [
      { id: 'reported',  label: '通報並安排代班', done: false },
      { id: 'paperwork', label: '請假手續完成',   done: false },
    ];
  }

  // 異常:病人離院特殊 checklist
  if (catId === 'event' && subType === '病人異常離院') {
    return [
      { id: 'lastSeen',     label: '已記錄發現時間 / 最後接觸時間',     done: false },
      { id: 'assessment',   label: '病人狀態評估(意識/管路/風險)',     done: false },
      { id: 'attending',    label: '已通知主治醫師',                     done: false },
      { id: 'policeDecide', label: '醫師裁決報警與否',                   done: false },
      { id: 'family',       label: '家屬聯繫',                           done: false },
      { id: 'chartRecord',  label: '病歷記錄完成',                       done: false },
      { id: 'tracking',     label: '追蹤狀態(返院/聯繫上/失聯)',       done: false },
    ];
  }

  const lists = {
    repair: [
      { id: 'submit',     label: '已開請修單',       done: false },
      { id: 'process',    label: '處理中',           done: false },
      { id: 'completed',  label: '維修完成',         done: false },
      { id: 'disposal',   label: '已報廢,等採購',   done: false },
    ],
    event: [
      { id: 'reported',     label: '班內主管知會',          done: false },
      { id: 'sac_decision', label: '病安 SAC 決策',         done: false, group: 'investigation' },
      { id: 'pdca',         label: 'PDCA 完成 (SAC 3)',     done: false, group: 'investigation' },
      { id: 'tracking',     label: '事件追蹤單繳交 (SAC 4)', done: false, group: 'investigation' },
      { id: 'not_case',     label: '❎ 調查後不成案,撤銷通報', done: false, group: 'not_case' },
      { id: 'notified',     label: '已告知當事人結果',      done: false },
    ],
    complaint: tier === 2 ? [
      { id: 'documented',     label: '已記錄客訴內容',         done: false },
      { id: 'apologized',     label: '已當面說明 / 道歉',      done: false },
      { id: 'escalated',      label: '已轉法務 / 關懷團隊',    done: false },
      { id: 'reply',          label: '書面回覆完成',           done: false },
      { id: 'closed_or_event',label: '處理完成或轉重大異常',   done: false },
    ] : [
      { id: 'documented', label: '已記錄客訴內容',  done: false },
      { id: 'apologized', label: '已當面說明 / 道歉', done: false },
      { id: 'monitor',    label: '48 小時觀察是否升溫', done: false },
    ],
    clinical: [
      { id: 'identified',   label: '問題定義清楚',                 done: false },
      { id: 'discussed',    label: '已與相關科室討論',             done: false },
      { id: 'solution',     label: '改善方案產出(我方問題)',     done: false, group: 'conclusion' },
      { id: 'referred',     label: '轉介科系處理(他方問題)',     done: false, group: 'conclusion' },
    ],
    vip: [
      { id: 'briefed',     label: '通知主治、主任',     done: false },
      { id: 'monitored',   label: '每班定時關注',       done: false },
      { id: 'discharged',  label: '病人離院 / 轉出',    done: false },
    ],
    mci: [
      { id: 'activated',   label: '啟動 MCI / 危機處理流程',     done: false },
      { id: 'briefed',     label: '通知主治、主任、值班護理長', done: false },
      { id: 'recorded',    label: '事件經過已詳細記錄',         done: false },
      { id: 'patient_list',label: '病人清單建立(病歷號 + 去向)', done: false },
      { id: 'media',       label: '媒體窗口/院方統一發言確認 (選填)', done: false, optional: true },
      { id: 'reported',    label: '已彙整給主管 / 上級',        done: false },
      { id: 'follow_up',   label: '後續追蹤完成',                done: false },
    ],
    infection: [
      { id: 'index_case',  label: '指標個案紀錄(病歷號、診斷、檢驗)', done: false },
      { id: 'reported_ic', label: '✅ 已通報感染管制',            done: false },
      { id: 'contacts',    label: '接觸者清單建立',                done: false },
      { id: 'isolation',   label: '隔離措施執行',                  done: false },
      { id: 'cleaning',    label: '環境清消完成',                  done: false },
      { id: 'follow_up',   label: '後續追蹤(篩檢結果)',          done: false },
    ],
  };

  // 重大外傷:子類別專屬 checklist
  if (catId === 'trauma') {
    if (subType === '性侵') {
      return [
        { id: 'team',          label: '團隊到位',                    done: false },
        { id: 'reported',      label: '已法定通報(24 小時內)',    done: false },
        { id: 'evid_full',     label: '已採證,證物與照片交社工',   done: false, group: 'evidence' },
        { id: 'evid_drug',     label: '已採證(含藥物檢體),交社工', done: false, group: 'evidence' },
        { id: 'evid_refused',  label: '病人拒絕採檢',                done: false, group: 'evidence' },
      ];
    }
    if (subType === '家暴' || subType === '兒虐') {
      return [
        { id: 'team',         label: '團隊到位',                              done: false },
        { id: 'imaging',      label: '影像/實驗室完成(含驗傷)',            done: false },
        { id: 'social',       label: '已轉社工(平日上班時間)',              done: false, group: 'transfer' },
        { id: 'night_nurse',  label: '已請夜護通報(假日 / 下班時間)',       done: false, group: 'transfer' },
        { id: 'reported',     label: '已法定通報(24 小時內)',              done: false },
      ];
    }
    return [
      { id: 'team',     label: '團隊到位',          done: false },
      { id: 'imaging',  label: '影像/實驗室完成',  done: false },
      { id: 'admit',    label: '入院 / 開刀房安排', done: false },
    ];
  }

  return lists[catId] || [];
}

// ====== Modals: 守則新增/編輯 ======
function openAddNote() { openNoteModal(null); }
function openEditNote(id) {
  const n = state.notes.find(x => x.id === id);
  if (n) openNoteModal(n);
}
function openNoteModal(note) {
  showModal(note ? '編輯守則' : '新增守則', `
    <label>分類</label>
    <input id="m-ncat" value="${note ? escapeHtml(note.cat) : ''}" placeholder="例:病安通報、醫糾應對">
    <label>標題</label>
    <input id="m-ntitle" value="${note ? escapeHtml(note.title) : ''}">
    <label>內容</label>
    <textarea id="m-nbody" style="min-height:160px;">${note ? escapeHtml(note.body) : ''}</textarea>
  `, async () => {
    const cat = document.getElementById('m-ncat').value.trim();
    const title = document.getElementById('m-ntitle').value.trim();
    const body = document.getElementById('m-nbody').value.trim();
    if (!cat || !title || !body) { toast('請填完整'); return false; }
    const r = note
      ? await api('updateNote', { id: note.id, cat, title, body })
      : await api('addNote',    { cat, title, body });
    if (r && r.ok) { refreshAll(); return true; }
    return false;
  });
}

// ====== Generic Modal ======
function showModal(title, contentHTML, onSubmit) {
  const root = document.getElementById('modal-root');
  root.innerHTML = `
    <div class="modal-bg" onclick="if(event.target===this)closeModal()">
      <div class="modal">
        <h2>${title.indexOf('AI') === 0 || title.indexOf('🤖') === 0 ? '<span class="ai-tag ai-tag-lg">AI</span>' + escapeHtml(title.replace(/^AI\s*|^🤖\s*/, '')) : escapeHtml(title)}</h2>
        ${contentHTML}
        <div class="modal-actions">
          <button onclick="closeModal()">取消</button>
          <button class="primary" id="modal-submit">確認</button>
        </div>
      </div>
    </div>`;
  document.getElementById('modal-submit').onclick = async () => {
    const ok = await onSubmit();
    if (ok) closeModal();
  };
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }

// ====== 交班摘要 ======
function genHandover() {
  const me = state.user.displayName;
  const now = nowStr();

  // ----- 純文字版本(用於複製) -----
  let txt = `急診 Leader 交班摘要\n交班人:${me}\n時間:${now}\n${'='.repeat(40)}\n\n`;

  // 🔔 交班宣導(排第一,最重要)
  const announceItems = state.cases.filter(x =>
    x.flags && x.flags.announce &&
    String(x.deleted || '') !== 'yes' &&
    x.state !== 'closed'
  );
  if (announceItems.length) {
    txt += `🔔 交班宣導(${announceItems.length} 件,需口頭講)\n`;
    announceItems.forEach((c, i) => {
      const at = (c.flags && c.flags.announceText) || {};
      const hasText = at.what || at.action || at.prevent;
      if (hasText) {
        txt += `  ${i+1}. [${CATS.find(x=>x.id===c.cat).label}]\n`;
        if (at.what)    txt += `     📌 ${at.what}\n`;
        if (at.action)  txt += `     ⚠️ ${at.action}\n`;
        if (at.prevent) txt += `     🎯 ${at.prevent}\n`;
      } else {
        txt += `  ${i+1}. [${CATS.find(x=>x.id===c.cat).label}] ${c.title}\n`;
      }
    });
    txt += '\n';
  }

  const pending = state.cases.filter(x => x.state === 'pending_approval');
  if (pending.length) {
    txt += `🔶 待批准封緘 (${pending.length} 件)\n`;
    pending.forEach(c => txt += `  • [${CATS.find(x=>x.id===c.cat).label}] ${c.title}${c.waitingFor && c.waitingFor !== "處理中" ? " — " + c.waitingFor : ""}\n`);
    txt += '\n';
  }

  const critical = state.cases.filter(x => x.state === 'open' && (
    x.priority === 'high' ||
    (x.flags && (x.flags.lawsuitRisk || x.flags.supervisorInvolved)) ||
    x.tier === 2 || x.tier === '2'
  ));
  if (critical.length) {
    txt += `🔴 高優先 / 醫糾 / 長官介入 (${critical.length} 件)\n`;
    critical.forEach(c => {
      const tags = [];
      if (c.flags && c.flags.lawsuitRisk) tags.push('醫糾');
      if (c.flags && c.flags.supervisorInvolved) tags.push('長官');
      if (c.tier === 2 || c.tier === '2') tags.push('Tier2');
      txt += `  • [${CATS.find(x=>x.id===c.cat).label}] ${c.title}${tags.length?` 〔${tags.join(',')}〕`:''}${c.waitingFor && c.waitingFor !== "處理中" ? " — " + c.waitingFor : ""}\n`;
      const lastP = c.progress && c.progress[c.progress.length-1];
      if (lastP) txt += `    最新進度:${lastP.text}\n`;
    });
    txt += '\n';
  }

  // 純文字版:其他未結案排除已列入「待批准」「高優先」的案件
  const txtCriticalIds = new Set(critical.map(c => c.id));
  const txtPendingIds = new Set(pending.map(c => c.id));
  CATS.filter(c => c.hasTracking).forEach(cat => {
    const open = state.cases.filter(x =>
      x.cat === cat.id &&
      x.state === 'open' &&
      !txtCriticalIds.has(x.id) &&
      !txtPendingIds.has(x.id)
    );
    if (!open.length) return;
    txt += `▸ ${cat.label} (${open.length} 件)\n`;
    open.forEach(c => txt += `  • ${c.title}${c.waitingFor && c.waitingFor !== "處理中" ? " — " + c.waitingFor : ""}\n`);
    txt += '\n';
  });

  // ----- 漂亮的 HTML 版本(顯示用) -----
  let html = `<div class="hd-meta">
    <div><span class="hd-k">交班人</span><strong>${escapeHtml(me)}</strong></div>
    <div><span class="hd-k">時間</span><strong>${escapeHtml(now)}</strong></div>
  </div>`;

  // 🔔 宣導事項(排最頂)
  if (announceItems.length) {
    html += `<div class="hd-section hd-announce">
      <div class="hd-h">🔔 交班宣導(口頭講) <span class="hd-count">${announceItems.length}</span></div>
      ${announceItems.map(c => {
        const at = (c.flags && c.flags.announceText) || {};
        const hasText = !!(at.what || at.action || at.prevent);
        if (!hasText) {
          // 沒填三題:走原本簡略樣式
          return `<div class="hd-row hd-clickable" onclick="jumpToCase('${c.cat}','${c.id}')">
            <span class="hd-cat">${CATS.find(x=>x.id===c.cat).label}</span>
            <span class="hd-title">${escapeHtml(c.title)}</span>
            ${c.waitingFor && c.waitingFor !== "處理中" ? `<span class="hd-status">${escapeHtml(c.waitingFor)}</span>` : ""}
          </div>`;
        }
        return `<div class="hd-row hd-row-block hd-clickable" onclick="jumpToCase('${c.cat}','${c.id}')">
          <div>
            <span class="hd-cat">${CATS.find(x=>x.id===c.cat).label}</span>
          </div>
          ${at.what ? `<div class="hd-ann-line"><span style="opacity:0.7;">📌</span> ${escapeHtml(at.what)}</div>` : ''}
          ${at.action ? `<div class="hd-ann-line"><span style="opacity:0.7;">⚠️</span> ${escapeHtml(at.action)}</div>` : ''}
          ${at.prevent ? `<div class="hd-ann-line hd-ann-prevent"><span style="opacity:0.7;">🎯</span> ${escapeHtml(at.prevent)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  }

  if (pending.length) {
    html += `<div class="hd-section hd-pending">
      <div class="hd-h">🔶 待批准封緘 <span class="hd-count">${pending.length}</span></div>
      ${pending.map(c => `
        <div class="hd-row hd-clickable" onclick="jumpToCase('${c.cat}','${c.id}')">
          <span class="hd-cat">${CATS.find(x=>x.id===c.cat).label}</span>
          <span class="hd-title">${escapeHtml(c.title)}</span>
          ${c.waitingFor && c.waitingFor !== "處理中" ? `<span class="hd-status">${escapeHtml(c.waitingFor)}</span>` : ""}
        </div>`).join('')}
    </div>`;
  }

  if (critical.length) {
    html += `<div class="hd-section hd-critical">
      <div class="hd-h">🔴 高優先 / 醫糾 / 長官介入 <span class="hd-count">${critical.length}</span></div>
      ${critical.map(c => {
        const tags = [];
        if (c.flags && c.flags.lawsuitRisk) tags.push('醫糾');
        if (c.flags && c.flags.supervisorInvolved) tags.push('長官');
        if (c.tier === 2 || c.tier === '2') tags.push('Tier 2');
        const lastP = c.progress && c.progress[c.progress.length-1];
        return `<div class="hd-row hd-row-block hd-clickable" onclick="jumpToCase('${c.cat}','${c.id}')">
          <div>
            <span class="hd-cat">${CATS.find(x=>x.id===c.cat).label}</span>
            <span class="hd-title">${escapeHtml(c.title)}</span>
            ${tags.map(t => `<span class="hd-tag">${t}</span>`).join('')}
            ${c.waitingFor && c.waitingFor !== "處理中" ? `<span class="hd-status">${escapeHtml(c.waitingFor)}</span>` : ""}
          </div>
          ${lastP ? `<div class="hd-progress">▸ ${escapeHtml(lastP.text)}</div>` : ''}
        </div>`;
      }).join('')}
    </div>`;
  }

  // 各類別未結案 — 排除已列入「高優先 / 醫糾 / 長官」與「待批准」的案件,避免重複
  const criticalIds = new Set(critical.map(c => c.id));
  const pendingIds = new Set(pending.map(c => c.id));
  let othersHtml = '';
  let othersCount = 0;
  CATS.filter(c => c.hasTracking).forEach(cat => {
    const open = state.cases.filter(x =>
      x.cat === cat.id &&
      x.state === 'open' &&
      !criticalIds.has(x.id) &&
      !pendingIds.has(x.id)
    );
    if (!open.length) return;
    othersCount += open.length;
    othersHtml += `<div class="hd-cat-group">
      <div class="hd-cat-h">${cat.label} <span class="hd-count-sm">${open.length} 件</span></div>
      ${open.map(c => `<div class="hd-row hd-clickable" onclick="jumpToCase('${c.cat}','${c.id}')">
        <span class="hd-title">${escapeHtml(c.title)}</span>
        ${c.waitingFor && c.waitingFor !== "處理中" ? `<span class="hd-status">${escapeHtml(c.waitingFor)}</span>` : ""}
      </div>`).join('')}
    </div>`;
  });
  if (othersHtml) {
    html += `<div class="hd-section hd-others">
      <div class="hd-h">📋 其他未結案 <span class="hd-count">${othersCount}</span></div>
      ${othersHtml}
    </div>`;
  }

  if (!pending.length && !critical.length && !othersHtml) {
    html += `<div style="text-align:center;padding:40px;color:var(--text2);font-size: 24px;">
      🎉 目前沒有未結案件,完美交班!
    </div>`;
  }

  // 顯示 modal(用更大的 size + 真實 HTML 預覽)
  showModalLarge('交班摘要', `
    <div class="hd-wrap">
      ${html}
    </div>
    <div style="display:flex;gap:8px;margin-top:14px;">
      <button class="primary" style="flex:1;" onclick="copyHandover()">📋 複製純文字版到剪貼簿</button>
      <button onclick="window._handoverTxt && (window.open('','_blank').document.body.innerText = window._handoverTxt)" style="display:none;">另開視窗</button>
    </div>
    <div style="font-size: 20px;color:var(--text2);margin-top:8px;line-height:1.5;">
      複製後可貼到 LINE / Email / Word。複製版為純文字格式,適合各種工具。
    </div>
  `, () => true);

  // 把純文字版暫存到 window,給複製按鈕用
  window._handoverTxt = txt;
}

async function copyHandover() {
  if (!window._handoverTxt) return;
  try {
    await navigator.clipboard.writeText(window._handoverTxt);
    toast('已複製到剪貼簿');
  } catch (e) {
    toast('複製失敗,請手動選取');
  }
}

// 從交班摘要點擊跳到該案件
function jumpToCase(catId, caseId) {
  closeModal();
  switchTab(catId);
  // 等分頁渲染完再滾過去並高亮
  setTimeout(() => {
    const cards = document.querySelectorAll(`#pane-${catId} .card`);
    let target = null;
    cards.forEach(card => {
      // 找到包含這個 caseId 的卡片(透過 onclick 或內部按鈕屬性)
      const html = card.innerHTML;
      if (html.indexOf(`'${caseId}'`) >= 0 || html.indexOf(`"${caseId}"`) >= 0) {
        target = card;
      }
    });
    if (target) {
      target.scrollIntoView({ behavior: 'smooth', block: 'center' });
      target.classList.add('card-highlight');
      setTimeout(() => target.classList.remove('card-highlight'), 2400);
    }
  }, 200);

  // 顯示「返回摘要」浮動按鈕
  showBackToHandoverButton();
}

function showBackToHandoverButton() {
  let btn = document.getElementById('back-to-handover');
  if (!btn) {
    btn = document.createElement('button');
    btn.id = 'back-to-handover';
    btn.className = 'back-to-handover';
    btn.innerHTML = '↩ 返回交班摘要';
    btn.onclick = () => {
      btn.remove();
      genHandover();
    };
    document.body.appendChild(btn);
  }
  // 5 分鐘後自動消失(避免使用者忘記它)
  clearTimeout(btn._timer);
  btn._timer = setTimeout(() => {
    if (btn.parentNode) btn.remove();
  }, 5 * 60 * 1000);
}

// ====== Toast ======
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}
